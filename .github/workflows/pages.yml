name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          npm install -g serve
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared
          chmod +x /tmp/cloudflared
          npm install -g @bubblewrap/cli

      - name: Start local server
        run: |
          serve -s . -p 4000 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/
          echo " Server running"

      - name: Create cloudflare tunnel
        run: |
          /tmp/cloudflared tunnel --url http://localhost:4000 --no-autoupdate > /tmp/tunnel.log 2>&1 &
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo "Tunnel: $URL"
              echo "APK_URL=$URL" >> $GITHUB_ENV
              break
            fi
            sleep 3
          done
          [ -n "$URL" ] || (cat /tmp/tunnel.log && exit 1)

      - name: Build APK with Bubblewrap
        run: |
          URL="${{ env.APK_URL }}"
          echo "Building from: $URL"
          cd /tmp
          mkdir -p bw-build
          cd bw-build
          echo "y" | bubblewrap init --manifest "$URL/manifest.json" 2>&1
          bubblewrap build --skipSigning 2>&1
          find . -name "*.apk" -exec cp {} /tmp/c152.apk \;
          ls -la /tmp/c152.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c152-android-apk
          path: /tmp/c152.apk
          if-no-files-found: warn
