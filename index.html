const CARDS3 = [
{id:'insp1',cat:'insp',title:'100-Hour Inspection Scope',emoji:'🔍',content:'14 CFR 91.409(b): Required for aircraft operated for hire or flight instruction. Scope per Part 43 Appendix D: engine, propeller, airframe, flight controls, landing gear, instruments, electrical, radios. Must be signed off by A&P. Includes: compression test, oil filter cut, spark plug service, cable inspection, AD check.',tip:'A 100-hour is NOT an annual — it does not renew the airworthiness certificate.',quiz:{q:'Who can sign 100-hour?',o:['Owner','A&P','A&P with IA','Pilot'],a:1}},
{id:'insp2',cat:'insp',title:'Annual Inspection Scope',emoji:'📅',content:'14 CFR 91.409(a): Required every 12 calendar months. Must be signed by A&P with IA. Scope: Part 43 Appendix D + all applicable ADs. Result: Approved for Return to Service or discrepancy list. Common items: compression test, oil filter, spark plugs, control cable tension, tire condition, brake pads, AD compliance, W&B update.',tip:'Annual \"expires\" on last day of month shown on the airworthiness certificate. No grace period.',quiz:{q:'Who signs annual?',o:['Any A&P','A&P with IA','Pilot','School owner'],a:1}},
{id:'insp3',cat:'insp',title:'Part 43 Appendix D Checklist',emoji:'📋',content:'Sections: 1) Propeller group, 2) Engine group, 3) Landing gear group, 4) Airframe group (surfaces, cables, skin), 5) Cockpit/panel group (instruments, switches, placards), 6) Electrical/radio group, 7) All other items (ADs, logs, W&B). Each item must be checked for: condition, security, proper operation.',tip:'Print the Appendix D checklist and use it — experienced IAs still use a written checklist.'},
{id:'insp4',cat:'insp',title:'Engine Compression Log',emoji:'💨',content:'Record at every 100-hr/annual: Cyl #1 ___/80, Cyl #2 ___/80, Cyl #3 ___/80, Cyl #4 ___/80. Note leak location (EXH/INT/BRTH). Ambient temp and tach time. Same IA should do consecutive compressions for trend analysis. A cylinder dropping 10 PSI between inspections needs attention even if still above 60/80.',tip:'Trend is more important than individual values. A cylinder going from 75 to 62 needs investigation.'},
{id:'insp5',cat:'insp',title:'Compression Test — Valve vs Ring',emoji:'🔧',content:'Air from EXHAUST = exhaust valve leak (burned valve, carbon on seat, tight clearance). Air from INTAKE = intake valve leak. Air from CRANKCASE BREATHER = worn rings or cylinder. Air from ADJACENT CYLINDER = head gasket failure between cylinders. Record where the air is coming from — it tells you what to fix.',tip:'A valve leak can sometimes be fixed by lapping. A ring leak = cylinder must come off.',quiz:{q:'Air from breather indicates?',o:['Exhaust valve','Worn rings','Intake valve','Head gasket'],a:1}},
{id:'insp6',cat:'insp',title:'Magneto Check (Run-Up)',emoji:'🧲',content:'Run-up at 1,700-2,000 RPM. Switch L — max drop 175 RPM, max diff 50 RPM between mags. Run-up at higher RPM (2,000+) for more sensitive test. If drop is excessive: suspect spark plugs first (most common), then ignition leads, then magneto. Carb heat check: pull ON — RPM should drop 100-200 RPM (warmer, less dense air).',tip:'If mag drop is rough (engine shakes), not smooth — a plug is fouled or a lead is breaking down.',quiz:{q:'Max mag drop at run-up?',o:['125 RPM','175 RPM','225 RPM','275 RPM'],a:1}},
{id:'insp7',cat:'insp',title:'Idle Speed & Mixture Check',emoji:'🎛️',content:'Warm engine, throttle closed. Idle speed: 600-700 RPM. If RPM drops below 600 or engine quits: increase idle stop screw. Idle mixture check: bring to 1,000 RPM, pull mixture to idle cutoff — engine must stop within 5 seconds. If it runs longer: idle mixture too rich. If it stops immediately: mixture too lean.',tip:'Engine that idles rough but runs fine at power = spark plugs or idle circuit issue.'},
{id:'insp8',cat:'insp',title:'Oil Filter Cut & Inspect',emoji:'🔬',content:'Cut filter with dedicated filter cutter (not hacksaw — metal shavings). Stretch element out, inspect under bright light. Normal: fine black carbon. Suspicious: fine metallic dust. Silver/aluminum = bearing wear. Magnetic particles = steel gear wear. Copper = bushing wear. Critical criteria: chunks, flakes, or any non-magnetic metal particles — ground engine.',tip:'Save the filter element in a plastic bag if you find metal — show it to the IA for evaluation.',quiz:{q:'Hacksaw acceptable for filter cutting?',o:['Yes','No — contaminates sample','Only if new blade','With lubricant'],a:1}},
{id:'insp9',cat:'insp',title:'Control Cable Tension Check',emoji:'🔗',content:'Measured with calibrated tensiometer. Standard (70°F): 25-45 lbs. Temp adjust: ±1 lb per 10°F. Measure at 3 points along cable run. If tension varies significantly (>10 lbs): probable pulley binding or cable damage. Record all readings in logbook. Safety wire all turnbuckles after adjustment — 4 turns minimum each end.',tip:'Temperature compensation example: 32°F day = target 31-38 lbs. 100°F day = target 22-32 lbs.'},
{id:'insp10',cat:'insp',title:'Battery Service Check',emoji:'🔋',content:'Wet cell (Gill G-35): Check electrolyte level — fill with DISTILLED WATER only to bottom of filler tube. Check specific gravity: 1.275-1.300 (fully charged), 1.200 (50%), 1.100 (discharged). Sealed (Concord RG-35): Check voltage — 12.8V+ = charged, 12.0V = discharged. Load test: Apply 105A for 15 sec — must stay above 9.6V at 80°F. Corrosion: clean terminals with baking soda + water.',tip:'A battery that is low on water has been overcharged. Check the voltage regulator setting.',quiz:{q:'Wet cell battery fill?',o:['Tap water','Distilled water','Battery acid','Nothing'],a:1}},
{id:'insp11',cat:'insp',title:'Spark Plug Annual Service',emoji:'🔥',content:'Every 100 hr/annual: Remove all 4 plugs (label by cylinder). Inspect: cracked ceramic, electrode erosion, deposits. Clean: media blast or wire brush. Gap: 0.016-0.021 in (use round wire feeler gauge — flat gauge may be inaccurate). New copper gasket. Torque: 25-30 ft-lb. Reinstall leads — must fully seat and lock. Run engine, check mag drop — should be lower than before service.',tip:'Index plugs: align the open side of the electrode gap toward the intake valve for best combustion.',quiz:{q:'Spark plug gap spec?',o:['0.012-0.016 in','0.016-0.021 in','0.021-0.025 in','0.025-0.030 in'],a:1}},
{id:'insp12',cat:'insp',title:'Brake & Tire Annual Check',emoji:'🛞',content:'Jack aircraft. Spin each wheel — listen for bearing roughness. End play check: rock wheel top/bottom — max 0.005 in. Brake pad min: 1/16 in. Disc min thickness: 0.180 in. Tire condition: tread wear bars visible? Sidewall cuts? Pressure: 30 PSI. Wheel alignment: toe-in 0° to 1/16 in. Safety wire: all wheel bolts wired correctly.',tip:'A wheel that stops spinning quickly with a grinding sound = bad bearing or dragging brake.'},
{id:'insp13',cat:'insp',title:'Propeller Annual Inspection',emoji:'🌀',content:'Remove prop from flange. Clean and inspect: blade surface (nicks, cracks, corrosion), leading edge condition, blade tip condition. Zyglo crack check (fluorescent dye) — mandatory. Flange bolt hole inspection: no elongation. Track check after reinstallation: within 1/16 in. Torque bolts to 55-65 ft-lb, safety wire. Log entry required.',tip:'Use new self-locking nuts EVERY time the prop is reinstalled. Never reuse.',quiz:{q:'Prop crack inspection method?',o:['Visual only','Zyglo (fluorescent)','X-ray','Ultrasonic'],a:1}},
{id:'insp14',cat:'insp',title:'Fluid Level Check Points',emoji:'🛢️',content:'Preflight engine: Oil level (dipstick — do not overfill past 6 qt). Brake fluid: reservoir under cowling (MIL-H-5606, must be visible). Battery electrolyte: if wet cell, distilled water to fill ring. Windshield washer: n/a on 152. All fluid caps and dipsticks must be secure after checking.',tip:'Check oil with engine cold (oil has drained to sump). Hot oil reading is inaccurate.'},
{id:'insp15',cat:'insp',title:'Avionics Check Procedure',emoji:'📡',content:'Turn on master, avionics master. Radios: key mic — transmit on tower freq, listen for side tone. Receive: tune to ATIS/ASOS, verify clear reception. VOR: tune VOR test freq, verify needle centers with 4° max error. Transponder: squawk 1200, verify reply light flashes. GPS (if installed): verify satellite acquisition, database current. Log any discrepancies.',tip:'A radio that transmits but does not receive (or vice versa) often needs a new tray or connector cleaning.'},
{id:'insp16',cat:'insp',title:'ELT Annual Check',emoji:'🆘',content:'ELT test: during first 5 min of any hour. Toggle switch to ON — listen on 121.5 for the sweep tone. Max 3 sweeps, then OFF. Check: battery expiration date (replace if expired or >50% of life used), G-switch (tilt test — should activate at 45° angle), remote switch in cockpit, antenna connection and cable condition. Log test results and next battery due date.',tip:'If the ELT accidentally activates and you cannot turn it off, disconnect the antenna coax cable.'},
{id:'insp17',cat:'insp',title:'W&B Check Procedure',emoji:'⚖️',content:'Required after repairs/modifications. 1) Place aircraft on level floor, 2) Level longitudinally (use level on door sill reference), 3) Place scales under each wheel, 4) Record weights (nose + left main + right main), 5) Use moment arms from datum to calculate CG, 6) Compare to POH CG envelope. Maximum change without re-weigh: 1% of MTOW or 0.2 in CG change.',tip:'The C152 datum is typically at the firewall, but verify in the POH — some variants differ.',quiz:{q:'When is W&B required?',o:['Only after paint','After repairs/modifications','Only annually','Never'],a:1}},
{id:'insp18',cat:'insp',title:'Landing Gear Wobble Test',emoji:'🛞',content:'With aircraft on jacks: Grasp each tire at the top and bottom. Push/pull firmly. Acceptable play: 0.001-0.005 in (barely feelable). Excessive play (>0.010 in): check wheel bearings first, then axle nut torque, then steering linkage (nose gear). Any play in the main gear spring leg attachment = worn bushings — replace.',tip:'If the wheel wobbles but the bearing feels smooth, the axle may be bent or the wheel flange is damaged.'},
{id:'insp19',cat:'insp',title:'Engine Mount & Vibration Check',emoji:'🔩',content:'Check engine mounts: 4 Lord rubber vibration isolators. Signs of failure: rubber separating from metal, cracking, compression set (mount is thinner than new). If any mount is bad, replace all 4. Also check: mount tubes for cracks at welds, engine attach bolts for torque (180-200 in-lb). Excessive engine vibration at any power setting = mount issue or prop imbalance.',tip:'Engine vibration that changes with RPM is more likely prop. Vibration that stays at all RPMs = engine mount.'},
{id:'insp20',cat:'insp',title:'Cabin & Interior Check',emoji:'💺',content:'Checked at annual: Seat tracks — cracks at bolt holes, security (AD 99-08-01 related). Seat belt webbing — fraying, latch operation. Shoulder harness — retraction, attachment. Emergency exit — window pops freely. Fire extinguisher — verify charged, gauge in green, mount secure. Placards — all legible, no missing. Door latch — positive lock, no rattles.',tip:'A seat that moves in the tracks during takeoff is a known Cessna issue. Always check track lock.'},
{id:'torque1',cat:'torque',title:'Engine Torque Table — Top End',emoji:'🔧',content:'Spark plugs: 25-30 ft-lb. Cylinder base nuts: 100-120 in-lb. Cylinder through bolts: 35-40 ft-lb. Rocker box cover: 25-30 in-lb. Rocker shaft bolts: 120-180 in-lb. Push rod tube seals: no torque (press fit with O-rings). Intake pipe nuts: 100-120 in-lb. Exhaust pipe nuts: 100-120 in-lb. Always use NEW self-locking nuts.',tip:'in-lb and ft-lb are different! 120 in-lb = 10 ft-lb. DO NOT confuse them — stripped threads are the result.',quiz:{q:'Spark plug torque?',o:['15-20 ft-lb','25-30 ft-lb','35-40 ft-lb','45-50 ft-lb'],a:1}},
{id:'torque2',cat:'torque',title:'Engine Torque Table — Bottom End',emoji:'🔩',content:'Connecting rod nuts: 265-275 in-lb (22-23 ft-lb). Main bearing nuts: 35-40 ft-lb. Crankcase through bolts: 110 in-lb (final step). Oil sump bolts: 70-80 in-lb. Oil drain plug: 10-12 ft-lb. Oil filter: hand-tight + 3/4 turn (18-20 ft-lb). Prop flange bolts: 55-65 ft-lb.',tip:'Connecting rod nuts are the most critical torque in the engine. Use a calibrated wrench and new nuts every time.'},
{id:'torque3',cat:'torque',title:'Airframe Torque Table',emoji:'🔧',content:'Engine mount bolts: 180-200 in-lb. Wing attach bolts (spar): 250-300 in-lb. Wing strut attach: 250-300 in-lb. Seat track bolts: 50-70 in-lb. Seat belt attach: 50-70 in-lb. Control column stops: 100-120 in-lb. Pulley bracket bolts: 50-70 in-lb. Fairlead attach: 25-35 in-lb. All bolts: use self-locking nuts or safety wire.',tip:'Wing attach bolts are life-limited — check service hours since new. Replace at specified interval.',quiz:{q:'Wing strut bolt torque?',o:['150-200 in-lb','250-300 in-lb','350-400 in-lb','450-500 in-lb'],a:1}},
{id:'torque4',cat:'torque',title:'Landing Gear Torque Table',emoji:'🔩',content:'Main gear attach bolts: 300-350 in-lb. Nose gear attach: 300-350 in-lb. Brake caliper bolts: 100-120 in-lb. Brake disc bolts: 50-80 in-lb. Wheel half bolts: 50-80 in-lb. Axle nut: 50-80 in-lb (then back off to slot for cotter pin). Shimmy damper bolts: 150-200 in-lb. Steering linkage bolts: 100-120 in-lb.',tip:'A loose brake caliper bolt will cause the caliper to rotate with the wheel — brake line gets ripped off.'},
{id:'torque5',cat:'torque',title:'Propeller Torque Table',emoji:'🔧',content:'Propeller mounting bolts: 55-65 ft-lb (dry — no anti-seize on the bolt threads that go into the crankshaft). Prop flange bolts (crank to flange): 55-65 ft-lb. Spinner bulkhead screws: 15-20 in-lb. Spinner screws: 10-15 in-lb. Use cross-torque pattern (star pattern). Retorque after first flight after prop installation.',tip:'Beam-type torque wrench is preferred for prop bolts. Click-type wrenches may not click at low settings.',quiz:{q:'Prop bolt torque method?',o:['Circle pattern','Star pattern','One at a time','Random'],a:1}},
{id:'torque6',cat:'torque',title:'Control System Torque Table',emoji:'🔧',content:'Control cable turnbuckle: 25-35 in-lb (jam nuts). Pulley guard bolts: 25-35 in-lb. Control surface hinge bolts: 50-70 in-lb. Elevator trim tab bolts: 25-35 in-lb. Flap torque tube bolts: 100-120 in-lb. Flap actuator mounts: 100-120 in-lb. All control system hardware MUST be safety-wired or have cotter pins.',tip:'Control system hardware failure = loss of control. Double-check every bolt and nut in the control system.'},
{id:'torque7',cat:'torque',title:'Engine Accessory Torque',emoji:'🔧',content:'Magneto mounting: 180-200 in-lb. Magneto drive coupling: 70-80 in-lb. Alternator mounting: 180-200 in-lb. Starter mounting: 180-200 in-lb. Alternator pulley nut: 250-300 in-lb. Vacuum pump mounting: 180-200 in-lb. Tachometer drive: 50-70 in-lb. All accessory mounting bolts must be safety-wired.',tip:'Alternator/starter mounting bolts that come loose will allow the unit to shift and destroy the belt/drive.',quiz:{q:'Magneto mounting torque?',o:['100-120 in-lb','180-200 in-lb','250-300 in-lb','350-400 in-lb'],a:1}},
{id:'torque8',cat:'torque',title:'Avionics/Instrument Torque',emoji:'🔧',content:'Instrument mounting screws: 10-15 in-lb (do not overtighten — plastic cases crack). Radio tray mounting: 25-35 in-lb. Antenna mounting: 25-35 in-lb. Static line fittings: 50-70 in-lb. Pitot line fittings: 50-70 in-lb. Avionics ground lug: 25-35 in-lb. Battery terminal nuts: 50-70 in-lb.',tip:'Over-torqued instrument mounting screws can crack the instrument case. Use a small torque screwdriver.'},
{id:'ad1',cat:'ad',title:'AD 98-10-04: Tailcone Bulkhead',emoji:'📋',content:'Applicability: Cessna 150/152 models with tailcone bulkhead P/N 04110033-1 or -2. Requirement: Repetitive eddy-current inspection every 500 hours of the tailcone bulkhead near the vertical fin attachment. Cracks start at rivet holes and propagate aft. Compliance: documented in logbook. Terminating action: replacement with improved bulkhead.',tip:'This is a fatigue-related AD. High-time airframes are more likely to develop cracks.',quiz:{q:'AD 98-10-04 inspection interval?',o:['100 hr','500 hr','1,000 hr','Annual'],a:1}},
{id:'ad2',cat:'ad',title:'AD 2000-07-05: Wing Spar',emoji:'📋',content:'Applicability: All Cessna 150/152 models. Requirement: Repetitive eddy-current inspection of the wing spar carry-through structure for cracks. Inspect at each 100-hr/annual until 10,000 flight hours, then every 500 hours. Cracks at spar bolt holes. If cracks found: immediate grounding until repair or replacement. Also check SB 93-01-01 for additional spar guidance.',tip:'This AD was issued after a fatigue-related wing separation. Compliance absolutely mandatory.',quiz:{q:'Wing spar AD cause?',o:['Corrosion','Fatigue cracking','Bird strike','Lightning'],a:1}},
{id:'ad3',cat:'ad',title:'AD 83-01-01: Muffler Inspection',emoji:'📋',content:'Applicability: Cessna 150/152 models with certain muffler P/Ns. Requirement: Repetitive inspection every 100 hours. Remove muffler shroud, inspect internal baffles for collapse/cracks using a mirror and light. If exhaust leaks into the heat shroud: muffler must be replaced. This is the most common recurring AD on the C152.',tip:'CO kills. A cracked muffler can fill the cabin with carbon monoxide in minutes during flight.',quiz:{q:'AD 83-01-01 interval?',o:['50 hr','100 hr','Annual','500 hr'],a:1}},
{id:'ad4',cat:'ad',title:'Lycoming SB 388C: Crankshaft',emoji:'📋',content:'Mandatory Service Bulletin 388C: Requires magnetic particle inspection (Magnaflux) of the O-235 crankshaft. Trigger: during any engine overhaul or after a propeller strike. Cracked crankshaft = replace. Also: inspect the crankshaft gear bolt per AD 2011-13-15. Check serial number applicability before assuming compliance.',tip:'A cracked crankshaft can fail without warning. This SB is critical for airframes with prop strike history.'},
{id:'ad5',cat:'ad',title:'Slick Magneto Recurring ADs',emoji:'📋',content:'Slick 4000/6000 series magnetos: multiple ADs affecting: 1) Impulse coupling (AD 86-13-03) — inspect for broken springs. 2) Gear shear (AD 2005-04-10) — potential for magneto gear failure causing total power loss. 3) Internal coil failure (AD 96-14-08) — blowout at high RPM. Check specific magneto model and serial numbers for applicability. Compliance: inspect at each annual.',tip:'Slick magneto ADs are common. Always check if the installed magneto model is affected.'},
{id:'ad6',cat:'ad',title:'AD 2011-13-15: Crank Gear Bolt',emoji:'📋',content:'Lycoming O-235 crankshaft gear bolt: Certain P/N bolts can fail in service. Failure = loss of oil pressure AND loss of alternator/magneto drive simultaneously. Requirement: inspect at overhaul or within 500 hours of the AD effective date. Replace bolt per instructions. This is a life-limited part — track hours on the gear bolt.',tip:'Crankshaft gear bolt failure = dual magneto drop + no oil pressure = total engine failure.',quiz:{q:'Crank gear bolt failure causes?',o:['Oil leak','Loss of oil + alternator + mags','Engine noise','Prop vibration'],a:1}},
{id:'ad7',cat:'ad',title:'AD 99-08-01: Starter Contactor',emoji:'📋',content:'Applicability: Cessna 152 with certain starter contactor part numbers. Problem: Internal failure can cause the starter to remain engaged after engine start. Starter motor continues to spin with engine = overheating + fire risk. Action: Inspect contactor, replace if suspect P/N. Compliance: before next flight after AD effective date.',tip:'If the starter stays engaged after start — KILL THE MASTER SWITCH immediately. Then troubleshoot.',quiz:{q:'AD 99-08-01 addresses?',o:['Oil filter','Starter contactor','Fuel line','Prop governor'],a:1}},
{id:'ad8',cat:'ad',title:'Fuel Hose Replacement ADs',emoji:'📋',content:'Multiple ADs and service bulletins require replacement of rubber fuel hoses on a time interval. Typical: 7-10 years for under-cowling fuel hoses. Check: date stamp on each hose (usually printed every 6 inches along the hose). If no date stamp or date exceeds the interval: replace. Hoses showing cracks, stiffness, or chafing: replace regardless of date.',tip:'Always put the installation date on the new hose with a permanent marker — avoids date confusion later.'},
{id:'ad9',cat:'ad',title:'Seat Track ADs Overview',emoji:'📋',content:'Multiple ADs address Cessna seat track cracks (AD 99-08-01 extension). Inspection area: both pilot and co-pilot seat tracks where the seat roller engages. Cracks at rivet holes. If crack extends to the edge: replace track. Interim action: stop-drill. A cracked seat track can allow the seat to slide aft during takeoff — pilot loses control of rudder pedals.',tip:'Rock the seat back and forth on the ground — if it moves more than 1/4 in, check the track for cracks.',quiz:{q:'Cracked seat track risk?',o:['Seat wobbles','Seat can slide back during T/O','Just noise','Visual only'],a:1}},
{id:'ad10',cat:'ad',title:'AD Note: Compass Compensation',emoji:'📋',content:'While not a separate AD, 14 CFR 23.1325 requires that the compass correction card be accurate. After any electrical modification or major repair: re-compensate the compass. Check: correction card data matches actual compass deviation. With engine ON, all electrical ON: aircraft on compass rose. Deviation >10° from known heading: compensation required.',tip:'Radios and electrical equipment affect the compass. Always compensate with all electrical systems operating.'},
{id:'proc1',cat:'proc',title:'Cylinder Replacement Procedure',emoji:'🔧',content:'1) Remove rocker covers, push rods, intake/exhaust, plugs. 2) Remove cylinder base nuts (100-120 in-lb) and through bolts (35-40 ft-lb). 3) Tap cylinder loose with rubber mallet — lift straight up off studs. 4) Clean crankcase mating surface. 5) New rings on piston (stagger gaps 120°). 6) New base gasket (or O-ring — check which type). 7) Install cylinder onto studs, carefully guide rings into bore. 8) Torque base nuts (50-60 then 100-120 in-lb). 9) Torque through bolts (35-40 ft-lb). 10) Install push rods, adjust valves, install rocker covers.',tip:'Mark push rods before removal — they must go back in the same position.',quiz:{q:'Cylinder base nut torque sequence?',o:['All at once','Diagonal pattern','Clockwise','Random'],a:1}},
{id:'proc2',cat:'proc',title:'Oil Filter Cut & Inspect Guide',emoji:'🔬',content:'1) Drain oil from filter into waste pan. 2) Use filter cutter tool (rotate around can). Remove top. 3) Pull out pleated element. 4) Unfold element completely. 5) Hold under bright light — look for: fine black carbon (normal), metallic particles (silver/aluminum = bearing), magnetic fines (steel = gear), copper (bronze bushing), chunks (serious). 6) Run magnet across element to check for ferrous metal. 7) If suspicious particles found: save in plastic bag for IA evaluation.',tip:'If you find metal, change the oil again in 10 hours and re-check. If metal reappears, engine investigation is needed.'},
{id:'proc3',cat:'proc',title:'Valve Lash Adjustment Steps',emoji:'🔧',content:'1) Remove rocker box covers. 2) Rotate prop to bring cylinder to TDC compression (both valves closed). 3) Check clearance with feeler gauge between rocker arm and valve stem tip. 4) Intake: 0.004-0.008 in. Exhaust: 0.006-0.012 in. 5) Adjust by loosening locknut, turning adjustment nut, re-tightening locknut. 6) Re-check clearance after tightening. 7) Rotate engine 360°, re-check. 8) Install new rocker box gaskets, torque covers to 25-30 in-lb.',tip:'Always check and adjust valves with the engine COLD (room temperature).',quiz:{q:'Exhaust valve clearance range?',o:['0.004-0.008 in','0.006-0.012 in','0.008-0.014 in','0.010-0.016 in'],a:1}},
{id:'proc4',cat:'proc',title:'Brake Bleeding Procedure',emoji:'🛑',content:'1) Fill reservoir with MIL-H-5606. 2) Attach hose to caliper bleeder screw, other end in catch bottle. 3) Open bleeder screw. 4) Push brake pedal slowly (full stroke) — watch for air bubbles in hose. 5) Close bleeder screw before releasing pedal. 6) Repeat until no bubbles appear. 7) Top off reservoir. 8) Repeat on other side. 9) Test: pump brakes 3 times — pedal must be firm with 1/2 in or less travel before engagement.',tip:'Spongy brakes = air still in the system. Let the brake fluid sit for 10 minutes after bleeding — air rises to the top.'},
{id:'proc5',cat:'proc',title:'Control Cable Replacement Steps',emoji:'🔗',content:'1) Remove old cable: measure length, note routing, cable guards, pulley positions. 2) Route new cable using the old cable as a guide (tape new to old, pull through). 3) At each pulley: ensure cable rides in groove center. 4) Swage end fittings: use Nicopress sleeve, 2 crimps with proper dies. 5) Attach to turnbuckles. 6) Apply initial tension (20-25 lbs). 7) Cycle controls full travel 3 times (seats cable into pulleys). 8) Final tension: 25-45 lbs (temp compensated). 9) Safety wire turnbuckles. 10) Log entry with final tension values.',tip:'Use a cable-puller tool to apply tension before locking turnbuckles — much easier than turning turnbuckles under tension.'},
{id:'proc6',cat:'proc',title:'Alternator Belt Replacement',emoji:'🔄',content:'1) Note belt routing before removal (photo helps). 2) Loosen alternator pivot bolt and adjustment bolt. 3) Push alternator toward engine, remove old belt. 4) Install new belt (same cross-section and length — check P/N). 5) Pry alternator outward until belt tension is correct: 1/2-3/4 in deflection at longest span midpoint. 6) Tighten adjustment bolt first (180-200 in-lb), then pivot bolt. 7) Start engine, verify charging. 8) Re-check tension after 5-10 hrs operation (new belts stretch).',tip:'If the new belt squeals at startup, it is either too loose or glazed. Check tension first.'},
{id:'proc7',cat:'proc',title:'Static System Leak Test',emoji:'📊',content:'1) Connect static test adapter to static port (or T-fitting at instrument). 2) Apply vacuum equivalent to -1,000 ft altitude. 3) Hold vacuum for 1 minute — must NOT leak down. 4) Release, check altimeter accuracy at various simulated altitudes (±20 ft at sea level for 14 CFR 91.411). 5) Check VSI zeros at static. 6) Reconnect pitot line, test pitot pressure hold. 7) Verify pitot heat operation. 8) Log results and next due date.',tip:'If static system fails leak test, check the static port O-rings first — most common failure point.',quiz:{q:'Static system test interval?',o:['Annual','12 months','24 months','60 months'],a:2}},
{id:'proc8',cat:'proc',title:'Wheel Bearing Repack',emoji:'🔧',content:'1) Jack aircraft, remove wheel. 2) Remove axle nut, flat washer, wheel assembly. 3) Pry out bearing cone (inner), then remove grease seal and outer cone. 4) Clean all parts with solvent (bearing cones, cups, spacer). 5) Inspect: pitting, spalling, brinelling, discoloration (overheated). Replace if damaged. 6) Pack bearings with Aeroshell 5 wheel bearing grease. 7) Install outer cone, new grease seal, inner cone. 8) Reinstall on axle — torque nut to 50 in-lb, back off to first slot, install cotter pin. Final end play: 0.001-0.005 in.',tip:'Use a bearing packer tool for best results. Hand-packing is acceptable but must force grease through from the wide side.',quiz:{q:'Wheel bearing grease type?',o:['Engine oil','Aeroshell 5','MIL-H-5606','WD-40'],a:1}},
{id:'proc9',cat:'proc',title:'Elapsed Time Since Installation',emoji:'⏱️',content:'Aircraft maintenance relies on tracking time. Three time measurements: 1) Tach time — from tachometer (engine RPM-based). 2) Hobbs meter — clock that runs with engine oil pressure. 3) Flight hours — pilot logbook. For maintenance: use tach time or time-in-service per aircraft records. Always verify the logbook time matches the instruments at each inspection start.',tip:'Tach time at cruise runs slower than Hobbs. At 2,400 RPM, ~1 tach hr = 1.1 Hobbs hr.'},
{id:'proc10',cat:'proc',title:'Propeller Strike Procedure',emoji:'💥',content:'Prop strike definition: Rotation of the propeller by hand or while running strikes any object. Steps: 1) Ground aircraft — do not fly. 2) Remove propeller, inspect for cracks (Zyglo). 3) Check crankshaft flange for damage/elongation. 4) Check crankshaft runout (max 0.002 in). 5) Remove engine per Lycoming SB — requires full teardown. 6) Inspect: crankshaft (Magnaflux), connecting rods, camshaft, accessory gears. 7) Replace all damaged parts. 8) Reassemble, run-in, log entry.',tip:'A prop strike that did not stop the engine still requires inspection. Crank damage can exist without stopping.',quiz:{q:'Prop strike requires?',o:['Clean prop only','Engine teardown per SB','Change oil','Just visual check'],a:1}},
{id:'proc11',cat:'proc',title:'Carburetor Idle Adjustment',emoji:'🎛️',content:'1) Run engine to operating temperature. 2) Reduce to idle — note RPM. 3) If RPM too low or high: adjust idle speed screw. Target: 600-700 RPM. 4) Check idle mixture: smoothly pull mixture to idle cutoff at 1,000 RPM — engine should stop within 5 seconds. 5) If too fast to stop: idle mixture is too rich (turn idle mix screw IN 1/2 turn). 6) If stops too quickly (<1 sec): idle mixture too lean (turn OUT 1/2 turn). 7) Recheck after each adjustment.',tip:'Always make small adjustments (1/8 to 1/4 turn) and let the engine stabilize before rechecking.'},
{id:'proc12',cat:'proc',title:'Magneto-to-Engine Timing',emoji:'🧲',content:'1) Remove #1 top and bottom spark plugs. 2) Install timing pin in crankshaft (if equipped) or use timing disk on prop flange. 3) Rotate engine to #1 TDC compression (both valves closed). 4) Set timing ring to 0°. 5) Rotate engine backward 30° (to clear backlash), then forward to 24° BTDC. 6) Connect timing light to #1 ignition lead. 7) Rotate engine to 500 RPM while observing timing light — should flash at exactly 24° BTDC. 8) Loosen magneto coupling nuts and rotate magneto body until timing light flashes at 24°. 9) Tighten nuts, recheck, safety-wire.',tip:'Left and right magnetos must be timed independently. Right mag should also fire at 24° ±1° BTDC.',quiz:{q:'Magnetic timing BTDC?',o:['20°','24°','28°','32°'],a:1}},
{id:'proc13',cat:'proc',title:'Oil Suction Screen Check',emoji:'🛢️',content:'Some O-235 variants have a suction screen (not a filter) on the lower left side of the crankcase. Check at every oil change: 1) Remove screen plug (large hex) — have a pan ready, oil will drain. 2) Pull out the wire mesh screen. 3) Inspect for debris — metal particles, carbon chunks, sludge. 4) Clean with solvent and brush. 5) Reinstall screen, torque plug to 50-60 ft-lb. 6) Top off oil, run engine, check for leaks.',tip:'Metal particles on the suction screen are a more serious finding than in the oil filter — the screen catches larger debris.'},
{id:'proc14',cat:'proc',title:'Tire Balance Check',emoji:'🛞',content:'For aircraft tires: dynamic balance is preferred but static balance is acceptable. Static: Mount wheel/tire assembly on a balance stand. Heavy spot settles to bottom. Add balance weights on the heavy side (opposite the heavy spot). Acceptable imbalance: within 1/4 oz. Unbalanced tire = vibration during taxi and takeoff roll. Tire with a flat spot cannot be balanced — replace it.',tip:'Most C152 tires are not balanced in practice, but a vibration during rollout that disappears in the air is an unbalanced tire.'},
{id:'cockpit1',cat:'cockpit',title:'Pitot Static System Check',emoji:'📊',content:'Pitot tube: Left wing strut, electrically heated. Static ports: flush on each fuselage side below the windshield. Line routing: aluminum line from pitot to ASI, from static to altimeter/VSI. Pitot heat: 10A at 14V — tested by feeling tube warmth 30 sec after turn-on. 24-month check per 91.411: leak test, altimeter calibration (±20 ft at SL), VSI zero check.',tip:'If the airspeed indicator works but the altimeter is stuck, the static line is blocked (not the pitot line).',quiz:{q:'Pitot location on C152?',o:['Nose','Left wing strut','Right wing','Tail'],a:1}},
{id:'cockpit2',cat:'cockpit',title:'Tachometer Drive Cable',emoji:'⏱️',content:'Tachometer is mechanically driven by a flexible cable from the engine accessory case. Cable outer housing: check for chafing, tight bends (min radius 6 in). Drive end at engine: square drive must engage fully. Cable replacement: if needle jumps or bounces at steady RPM — cable is binding or dry. Lubricate with graphite cable lube (graphite powder). Never use oil — it gum up.',tip:'If the tach reads zero at idle but jumps up at higher RPM, the cable is likely broken or disconnected at the engine end.'},
{id:'cockpit3',cat:'cockpit',title:'Altimeter Inspection Check',emoji:'🔝',content:'Altimeter must be checked every 24 months per 14 CFR 91.411. Bench check: Set to local baro, check altitude at various pressure settings. Accuracy: ±20 ft at sea level, increasing tolerance at higher altitudes. Also check: Kollsman window clarity, baro setting knob friction, case for damage/leaks. A failed altimeter check = cannot fly IFR or in Class A airspace.',tip:'If altimeter reads high (shows higher than actual altitude) — you are LOWER than the instruments indicate. Danger!',quiz:{q:'Altimeter check interval?',o:['12 mo','24 mo','36 mo','60 mo'],a:1}},
{id:'cockpit4',cat:'cockpit',title:'Airspeed Indicator Check',emoji:'🏎️',content:'ASI check during static system test: Apply pitot and static pressure at various airspeeds. Compare to standard (should match within ±3 KIAS at cruise). Check: pointer smoothness (no sticking), no moisture in case (fogging indicates leaking seal), case seal integrity. Color arc markings: verify they are correct and not faded. White 40-85, Green 47-111, Yellow 111-149, Red 149 KIAS.',tip:'If the ASI needle vibrates at any speed, there is air in the pitot line or a loose connection.'},
{id:'cockpit5',cat:'cockpit',title:'Vacuum Gyro Instruments',emoji:'🌀',content:'If installed: Vacuum pump drives attitude indicator and directional gyro. Normal vacuum: 4.5-5.5 in Hg. Low vacuum (<4.0): gyro precession increases, instruments unreliable. Filter: check/clean the vacuum filter at annual. Failure sign: gyro noise or slow spool-up on start. If vacuum fails: partial panel with turn coordinator, compass, airspeed, altimeter — practice this.',tip:'Partial panel flying (without gyros) is a required skill. Practice it in VMC conditions to stay sharp.'},
{id:'cockpit6',cat:'cockpit',title:'Instrument Panel Lighting',emoji:'💡',content:'Instrument flood lights (LED or incandescent): Replace bulbs if burned out. Post light: Individual post lights around each instrument — check bulbs and wiring. Dimming: rheostat knob controls brightness. Fuse/breaker: typically one breaker for panel lights. For night flight: ALL instrument lights must be operational (14 CFR 91.205).',tip:'Red instrument lights preserve night vision. If the white lights fail, a red-lens flashlight is a legal backup.'},
{id:'cockpit7',cat:'cockpit',title:'Turn Coordinator Check',emoji:'🔄',content:'Electric turn coordinator: Self-erecting gyro. Check before flight: turn master ON, listen for gyro spool-up (high-pitched whine). Check: in a turn, the miniature aircraft banks in the direction of turn — must indicate standard rate (2 minutes for 360°). Inclinometer ball: free movement. Vibration: no unusual sounds. A failed turn coordinator = no backup attitude reference for partial panel.',tip:'The turn coordinator is electric, so it works if the alternator fails. It is your only gyro in a partial panel scenario.'},
{id:'cockpit8',cat:'cockpit',title:'Fuel Quantity Gauge Calibration',emoji:'⛽',content:'C152 fuel gauges (L/R) are electrically driven by float-type senders in each wing. Calibration check at annual: With known fuel quantity, check gauges read correctly. Accuracy: ±5% is typical — not highly accurate. Common problems: float arm binding, float leaking (fills with fuel = reads empty), sender resistance drift, gauge calibration drift. Corrective action: remove sender, test resistance through full range.',tip:'If the gauge reads full but the tank is low, the float is likely stuck in the up position.'},
{id:'cockpit9',cat:'cockpit',title:'ELT Installation & Antenna',emoji:'🆘',content:'ELT mounted in the tailcone (behind baggage compartment). Antenna: whip antenna on top of fuselage. Coax cable: RG-58, routed along fuselage. Check: coax for kinks/cuts at access points, antenna base for corrosion, coax connector at ELT for secure attachment. Battery: must be replaced when expired or when ELT has been used for >1 hour cumulative. ELT must be accessible for remote activation — G-switch activates on impact.',tip:'The ELT antenna is fragile — be careful when working in the tailcone area not to damage the coax connection.'},
{id:'cockpit10',cat:'cockpit',title:'Required Placards & Markings',emoji:'📋',content:'C152 required placards: 1) Airworthiness certificate (forward of baggage or on panel). 2) Registration certificate. 3) Operating limitations (POH or placard). 4) Compass correction card. 5) Fuel grade/oil grade placard near filler caps. 6) Baggage limit placard (120 lbs). 7) Maneuver limits — no aerobatics except spins. All placards must be legible. Missing/faded placards = airworthiness discrepancy. Replace with original part numbers.',tip:'If a placard is missing, the aircraft is technically not airworthy. Order replacements promptly.',quiz:{q:'Required certificate in cockpit?',o:['Only pilot cert','AWC + Registration','Maintenance manual','Insurance card'],a:1}},
];
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════
const ALL_CARDS = [...CARDS, ...CARDS2, ...CARDS3];
const TOTAL_CARDS = ALL_CARDS.length;
let cards = [...ALL_CARDS];
let currentIndex = 0;
let viewedCards = JSON.parse(localStorage.getItem('c152_viewed')||'{}');
let bookmarks = JSON.parse(localStorage.getItem('c152_bm')||'[]');
let streak = JSON.parse(localStorage.getItem('c152_streak')||'{"count":0,"last":"","xp":0}');
let isAnimating = false;
let filterCat = null;
let isShuffled = false;
let quizMode = false;
let quizCards = [];
let quizIndex = 0;
let quizScore = 0;
let quizTotal = 0;
let genCount = 0;

function getCache() {
  let c = localStorage.getItem('c152_gen');
  if(c) try{return JSON.parse(c)}catch(e){}
  return {};
}
function setCache(v) {
  localStorage.setItem('c152_gen',JSON.stringify(v));
}

// ═══ PWA INSTALL ═══
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show')});
document.getElementById('installBtn').addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show')})}});
document.getElementById('installClose').addEventListener('click',()=>{document.getElementById('install-banner').classList.remove('show')});

// ═══ GENERATE UNLIMITED CARDS ═══
function generateCard() {
  genCount++;
  let tmpl = GEN_TEMPLATES[genCount % GEN_TEMPLATES.length];
  let ti = Math.floor(Math.random() * tmpl.t.length);
  let ci = tmpl.c[Math.min(ti, tmpl.c.length-1)];
  let ai = tmpl.a ? tmpl.a[Math.min(ti, tmpl.a.length-1)] : [];
  let txt = ci;
  if(ai && ai.length) {
    for(let i=0;i<ai.length;i++) {
      if(typeof ai === 'string') break;
      let vals = ai[i] ? ai[i].split('/') : ['?'];
      let v = vals[Math.floor(Math.random()*vals.length)];
      txt = txt.replace('{'+String.fromCharCode(97+i)+'}', v);
    }
  }
  let tipArr = tmpl.tip || ['Important for maintenance technicians to know.'];
  let tip = tipArr[Math.min(ti, tipArr.length-1)];
  let id = 'gen_' + Date.now() + '_' + genCount;
  return {
    id, cat: tmpl.cat, emoji: tmpl.emoji,
    title: tmpl.t[Math.min(ti, tmpl.t.length-1)],
    content: txt, tip: tip
  };
}

function getVisibleCards() {
  if(filterCat) return cards.filter(c=>c.cat===filterCat);
  return cards;
}

function ensureCardCount() {
  // ensure at least 20 cards visible
  let vis = getVisibleCards();
  while(vis.length < 20) {
    let newCard = generateCard();
    // Check not duplicate
    if(!cards.find(c=>c.id===newCard.id)) {
      cards.push(newCard);
    }
    vis = getVisibleCards();
  }
}

// ═══ UI ═══
const container = document.getElementById('cardContainer');
const catLabel = document.getElementById('catLabel');
const toast = document.getElementById('toast');

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toast.classList.remove('show'),2000);
}

function trackView(id) {
  viewedCards[id] = (viewedCards[id]||0)+1;
  localStorage.setItem('c152_viewed',JSON.stringify(viewedCards));
  // XP for viewing
  if(viewedCards[id] <= 1) {
    streak.xp += 3;
  } else {
    streak.xp += 1;
  }
  localStorage.setItem('c152_streak',JSON.stringify(streak));
  updateStreak();
}

function renderCard(index) {
  let vis = getVisibleCards();
  ensureCardCount();
  vis = getVisibleCards();
  if(index < 0) index = 0;
  if(index >= vis.length) {
    // Generate more cards
    for(let i=0;i<10;i++) {
      let nc = generateCard();
      if(!cards.find(c=>c.id===nc.id)) {
        cards.push(nc);
      }
    }
    vis = getVisibleCards();
  }
  if(vis.length === 0) return;
  currentIndex = Math.min(index, vis.length-1);
  let card = vis[currentIndex];
  let cat = CAT_MAP[card.cat] || CATEGORIES[0];
  catLabel.textContent = cat.name;
  catLabel.style.background = cat.color+'22';
  trackView(card.id);
  
  let qBtn = document.getElementById('quizBtn');
  if(card.quiz) {
    qBtn.style.display = 'flex';
    qBtn.dataset.quiz = 'true';
  } else {
    qBtn.style.display = 'flex';
    qBtn.dataset.quiz = 'false';
  }
  
  let bmBtn = document.getElementById('bookmarkBtn');
  if(bookmarks.includes(card.id)) {
    bmBtn.textContent = '❤️';
    bmBtn.classList.add('bookmarked');
  } else {
    bmBtn.textContent = '🤍';
    bmBtn.classList.remove('bookmarked');
  }
  
  container.innerHTML = `<div class="card" id="activeCard">
    <div class="emoji">${card.emoji||'✈️'}</div>
    <div class="title">${card.title}</div>
    <div class="content">${card.content}</div>
    ${card.tip ? `<div class="tip"><div class="tip-label">💡 Pro Tip</div><div class="tip-text">${card.tip}</div></div>` : ''}
    <div class="card-num">#${currentIndex+1} of ∞</div>
  </div>`;
}

function animateTo(index, dir) {
  if(isAnimating) return;
  let oldEl = document.getElementById('activeCard');
  if(!oldEl) { renderCard(index); return; }
  isAnimating = true;
  let exitClass = dir > 0 ? 'exit-up' : 'exit-down';
  oldEl.classList.add(exitClass);
  setTimeout(()=>{
    renderCard(index);
    let newEl = document.getElementById('activeCard');
    if(newEl) {
      let enterClass = dir > 0 ? 'enter-up' : 'enter-down';
      newEl.classList.add(enterClass);
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          newEl.classList.remove(enterClass);
          isAnimating = false;
        });
      });
    } else {
      isAnimating = false;
    }
  }, 350);
}

function nextCard() {
  let vis = getVisibleCards();
  if(currentIndex < vis.length - 1) {
    animateTo(currentIndex + 1, 1);
  } else {
    // Generate more
    for(let i=0;i<10;i++) {
      let nc = generateCard();
      if(!cards.find(c=>c.id===nc.id)) {
        cards.push(nc);
      }
    }
    animateTo(currentIndex + 1, 1);
  }
}

function prevCard() {
  if(currentIndex > 0) {
    animateTo(currentIndex - 1, -1);
  }
}

// ═══ SWIPE ═══
let touchStartY = 0;
let touchDeltaY = 0;
let isSwiping = false;

document.getElementById('card-area').addEventListener('touchstart',e=>{
  touchStartY = e.touches[0].clientY;
  isSwiping = true;
}, {passive:true});

document.getElementById('card-area').addEventListener('touchmove',e=>{
  if(!isSwiping) return;
  touchDeltaY = e.touches[0].clientY - touchStartY;
  let card = document.getElementById('activeCard');
  if(card) {
    let pct = Math.min(Math.abs(touchDeltaY)/window.innerHeight*100, 50);
    if(touchDeltaY > 0) {
      card.style.transform = `translateY(${pct}vh) scale(${1-pct/200})`;
      card.style.opacity = 1 - pct/60;
    } else {
      card.style.transform = `translateY(${-pct}vh) scale(${1-pct/200})`;
      card.style.opacity = 1 - pct/60;
    }
  }
}, {passive:true});

document.getElementById('card-area').addEventListener('touchend',e=>{
  isSwiping = false;
  let card = document.getElementById('activeCard');
  if(!card) return;
  card.style.transform = '';
  card.style.opacity = '';
  if(Math.abs(touchDeltaY) > 80) {
    if(touchDeltaY > 0) prevCard();
    else nextCard();
  }
  touchDeltaY = 0;
}, {passive:true});

// ═══ TAP ═══
document.getElementById('card-area').addEventListener('click',e=>{
  if(isSwiping) return;
  let rect = e.currentTarget.getBoundingClientRect();
  let y = e.clientY - rect.top;
  let h = rect.height;
  if(y < h * 0.4) prevCard();
  else if(y > h * 0.6) nextCard();
});

// ═══ KEYBOARD ═══
document.addEventListener('keydown',e=>{
  if(e.key === 'ArrowUp' || e.key === 'ArrowLeft') prevCard();
  if(e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') nextCard();
});

// ═══ BOOKMARK ═══
document.getElementById('bookmarkBtn').addEventListener('click',()=>{
  let vis = getVisibleCards();
  let card = vis[currentIndex];
  if(!card) return;
  let idx = bookmarks.indexOf(card.id);
  if(idx >= 0) {
    bookmarks.splice(idx,1);
    showToast('Bookmark removed');
    document.getElementById('bookmarkBtn').textContent = '🤍';
    document.getElementById('bookmarkBtn').classList.remove('bookmarked');
  } else {
    bookmarks.push(card.id);
    showToast('Bookmarked! ❤️');
    document.getElementById('bookmarkBtn').textContent = '❤️';
    document.getElementById('bookmarkBtn').classList.add('bookmarked');
  }
  localStorage.setItem('c152_bm',JSON.stringify(bookmarks));
});

// ═══ SHUFFLE ═══
document.getElementById('shuffleBtn').addEventListener('click',()=>{
  let vis = getVisibleCards();
  if(vis.length < 2) return;
  let idx = Math.floor(Math.random() * vis.length);
  while(idx === currentIndex && vis.length > 1) {
    idx = Math.floor(Math.random() * vis.length);
  }
  animateTo(idx, idx > currentIndex ? 1 : -1);
  showToast('🔀 Shuffled!');
});

// ═══ SEARCH ═══
document.getElementById('searchBtn').addEventListener('click',()=>{
  openModal('Search', `<input class="search-input" id="searchInput" placeholder="Search topics..." inputmode="search" autocomplete="off" enterkeyhint="search">
    <div class="search-results" id="searchResults"></div>`);
  const inp = document.getElementById('searchInput');
  inp.focus();
  inp.addEventListener('input',()=>{
    let q = inp.value.toLowerCase().trim();
    let res = document.getElementById('searchResults');
    if(!q) { res.innerHTML='<div class="empty-state">Type to search</div>'; return; }
    let found = ALL_CARDS.filter(c => (c.title+' '+c.content+' '+(c.tip||'')).toLowerCase().includes(q));
    if(found.length === 0) {
      res.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>No results</div>';
      return;
    }
    res.innerHTML = found.slice(0,30).map(c => {
      let cat = CAT_MAP[c.cat]||{};
      return `<div class="bm-item" data-id="${c.id}"><span class="bm-emoji">${c.emoji||'📄'}</span><span class="bm-title">${c.title}</span><div class="bm-cat">${cat.name||''}</div></div>`;
    }).join('');
    res.querySelectorAll('.bm-item').forEach(el=>{
      el.addEventListener('click',()=>{
        closeModal();
        let id = el.dataset.id;
        let idx = ALL_CARDS.findIndex(c=>c.id===id);
        if(idx>=0) {
          // Reset to show this card
          if(filterCat) filterCat = null;
          cards = [...ALL_CARDS];
          let vis = getVisibleCards();
          let newIdx = vis.findIndex(c=>c.id===id);
          if(newIdx>=0) animateTo(newIdx,1);
        }
      });
    });
  });
});

// ═══ QUIZ ═══
document.getElementById('quizBtn').addEventListener('click',()=>{
  let vis = getVisibleCards();
  let card = vis[currentIndex];
  if(!card || !card.quiz) {
    // Start quiz mode from bookmarks or random
    startFullQuiz();
    return;
  }
  startSingleQuiz(card);
});

function startSingleQuiz(card) {
  let q = card.quiz;
  openModal('Quick Quiz', `<div class="quiz-card"><div class="q">${q.q}</div>
    ${q.o.map((o,i)=>`<button class="quiz-option" data-idx="${i}">${o}</button>`).join('')}
    <div class="quiz-result" id="quizResult"></div></div>`);
  document.querySelectorAll('.quiz-option').forEach(btn=>{
    btn.addEventListener('click',()=>{
      let idx = parseInt(btn.dataset.idx);
      let correct = idx === q.a;
      document.querySelectorAll('.quiz-option').forEach(b=>{
        let bi = parseInt(b.dataset.idx);
        if(bi === q.a) b.classList.add('correct');
        if(b === btn && !correct) b.classList.add('wrong');
        b.disabled = true;
      });
      let res = document.getElementById('quizResult');
      if(correct) {
        res.innerHTML = '✅ Correct! +5 XP';
        streak.xp += 5;
      } else {
        res.innerHTML = '❌ The answer was: ' + q.o[q.a];
        streak.xp += 1;
      }
      localStorage.setItem('c152_streak',JSON.stringify(streak));
      updateStreak();
    });
  });
}

function startFullQuiz() {
  let qCards = ALL_CARDS.filter(c=>c.quiz);
  if(qCards.length === 0) { showToast('No quiz cards available'); return; }
  // Shuffle and pick 10
  let shuffled = [...qCards].sort(()=>Math.random()-0.5).slice(0,10);
  quizCards = shuffled;
  quizIndex = 0;
  quizScore = 0;
  quizTotal = shuffled.length;
  showQuizQuestion();
}

function showQuizQuestion() {
  if(quizIndex >= quizCards.length) {
    let pct = Math.round(quizScore/quizTotal*100);
    openModal('Quiz Complete!', `<div class="quiz-result">🏆 You scored ${quizScore}/${quizTotal} (${pct}%)</div>
      <div class="quiz-score"><div class="num">+${Math.round(quizScore*5)} XP</div><div class="label">earned from this quiz</div></div>
      <button class="quiz-option" style="text-align:center;margin-top:16px" id="quizRetry">🔄 Try Again</button>`);
    streak.xp += quizScore * 5;
    localStorage.setItem('c152_streak',JSON.stringify(streak));
    updateStreak();
    document.getElementById('quizRetry')?.addEventListener('click',()=>{closeModal();startFullQuiz()});
    return;
  }
  let card = quizCards[quizIndex];
  let q = card.quiz;
  openModal(`Quiz ${quizIndex+1}/${quizTotal}`, `<div class="quiz-card">
    <div style="font-size:.7rem;color:#666;margin-bottom:8px">${card.title}</div>
    <div class="q">${q.q}</div>
    ${q.o.map((o,i)=>`<button class="quiz-option" data-idx="${i}">${o}</button>`).join('')}
    <div class="quiz-result" id="quizResult"></div>
    <div style="text-align:center;margin-top:8px;font-size:.8rem;color:#555">Score: ${quizScore}/${quizTotal}</div></div>`);
  document.querySelectorAll('.quiz-option').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.disabled) return;
      let idx = parseInt(btn.dataset.idx);
      let correct = idx === q.a;
      document.querySelectorAll('.quiz-option').forEach(b=>{
        let bi = parseInt(b.dataset.idx);
        if(bi === q.a) b.classList.add('correct');
        if(b === btn && !correct) b.classList.add('wrong');
        b.disabled = true;
      });
      if(correct) quizScore++;
      let res = document.getElementById('quizResult');
      res.innerHTML = correct ? '✅ Correct!' : '❌ ' + q.o[q.a];
      setTimeout(()=>{quizIndex++;showQuizQuestion()},1500);
    });
  });
}

// ═══ STREAK ═══
function updateStreak() {
  let today = new Date().toDateString();
  if(streak.last !== today) {
    let yesterday = new Date(Date.now()-86400000).toDateString();
    if(streak.last === yesterday) {
      streak.count++;
    } else if(streak.last !== today) {
      streak.count = 1;
    }
    streak.last = today;
    localStorage.setItem('c152_streak',JSON.stringify(streak));
  }
}

// ═══ BADGES ═══
const BADGES = [
  {id:'first',name:'First Steps',icon:'👶',req:()=>Object.keys(viewedCards).length>=1},
  {id:'ten',name:'10 Cards',icon:'📖',req:()=>Object.keys(viewedCards).length>=10},
  {id:'fifty',name:'Knowledge Seeker',icon:'🧠',req:()=>Object.keys(viewedCards).length>=50},
  {id:'hundred',name:'Century',icon:'💯',req:()=>Object.keys(viewedCards).length>=100},
  {id:'streak3',name:'3-Day Streak',icon:'🔥',req:()=>streak.count>=3},
  {id:'streak7',name:'Week Warrior',icon:'⭐',req:()=>streak.count>=7},
  {id:'streak14',name:'Dedicated',icon:'⚡',req:()=>streak.count>=14},
  {id:'streak30',name:'Master Mechanic',icon:'🏆',req:()=>streak.count>=30},
  {id:'xp100',name:'Apprentice',icon:'🔧',req:()=>streak.xp>=100},
  {id:'xp500',name:'Journeyman',icon:'🛠️',req:()=>streak.xp>=500},
  {id:'xp1000',name:'Expert',icon:'⚙️',req:()=>streak.xp>=1000},
  {id:'bm5',name:'Collector',icon:'🔖',req:()=>bookmarks.length>=5},
  {id:'bm20',name:'Librarian',icon:'📚',req:()=>bookmarks.length>=20},
  {id:'allcats',name:'Explorer',icon:'🌍',req:()=>{let cats=new Set(Object.keys(viewedCards).map(id=>{let c=ALL_CARDS.find(cc=>cc.id===id);return c?c.cat:null}).filter(Boolean));return cats.size>=10}},
  {id:'quiz10',name:'Quiz Taker',icon:'🧪',req:()=>streak.xp>=50&&quizTotal>=5},
];
function getLevel(xp) { return Math.floor(xp/50)+1; }

// ═══ MODAL ═══
const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
document.getElementById('modalClose').addEventListener('click',closeModal);

function openModal(title, html) {
  modalTitle.textContent = title;
  modalBody.innerHTML = html;
  modalOverlay.classList.add('active');
}
function closeModal() {
  modalOverlay.classList.remove('active');
}

// ═══ BOTTOM NAV ═══
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let view = btn.dataset.view;
    if(view === 'feed') {
      closeModal();
    } else if(view === 'categories') {
      showCategories();
    } else if(view === 'bookmarks') {
      showBookmarks();
    } else if(view === 'profile') {
      showProfile();
    }
  });
});

function showCategories() {
  openModal('Topics', `<div class="cat-grid">${CATEGORIES.map(c=>{
    let count = ALL_CARDS.filter(ca=>ca.cat===c.id).length;
    let viewed = ALL_CARDS.filter(ca=>ca.cat===c.id).filter(ca=>viewedCards[ca.id]).length;
    let pct = count>0 ? Math.round(viewed/count*100) : 0;
    return `<div class="cat-item" data-cat="${c.id}">
      <div class="cat-emoji">${c.emoji}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${viewed}/${count}</div>
      <div class="cat-prog"><div class="cat-prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('')}</div>`);
  document.querySelectorAll('.cat-item').forEach(el=>{
    el.addEventListener('click',()=>{
      let cat = el.dataset.cat;
      closeModal();
      filterCat = cat;
      cards = [...ALL_CARDS];
      let vis = getVisibleCards();
      if(vis.length) {
        currentIndex = 0;
        renderCard(0);
      }
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-view="feed"]').classList.add('active');
    });
  });
}

function showBookmarks() {
  let items = bookmarks.map(id=>ALL_CARDS.find(c=>c.id===id)).filter(Boolean);
  if(items.length===0) {
    openModal('Bookmarks', '<div class="empty-state"><div class="empty-icon">🔖</div>No bookmarks yet</div>');
    return;
  }
  openModal('Bookmarks', `<div class="bm-list">${items.map(c=>{
    let cat = CAT_MAP[c.cat]||{};
    return `<div class="bm-item" data-id="${c.id}">
      <button class="bm-del" data-id="${c.id}">✕</button>
      <span class="bm-emoji">${c.emoji||'📄'}</span>
      <span class="bm-title">${c.title}</span>
      <div class="bm-cat">${cat.name||''}</div>
    </div>`;
  }).join('')}</div>`);
  document.querySelectorAll('.bm-item').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.classList.contains('bm-del')) return;
      let id = el.dataset.id;
      closeModal();
      let idx = ALL_CARDS.findIndex(c=>c.id===id);
      if(idx>=0) {
        filterCat = null;
        cards = [...ALL_CARDS];
        let vis = getVisibleCards();
        let newIdx = vis.findIndex(c=>c.id===id);
        if(newIdx>=0) animateTo(newIdx,1);
      }
    });
  });
  document.querySelectorAll('.bm-del').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      let id = el.dataset.id;
      bookmarks = bookmarks.filter(b=>b!==id);
      localStorage.setItem('c152_bm',JSON.stringify(bookmarks));
      showBookmarks();
      showToast('Removed bookmark');
    });
  });
}

function showProfile() {
  let lvl = getLevel(streak.xp);
  let nextXp = lvl * 50;
  let curXp = streak.xp - (lvl-1)*50;
  let viewedCount = Object.keys(viewedCards).length;
  let totalCards = ALL_CARDS.length;
  let pct = Math.min(100, Math.round(viewedCount/totalCards*100));
  let badgesHtml = BADGES.map(b=>{
    let unlocked = b.req();
    return `<div class="badge ${unlocked?'unlocked':'locked'}" title="${b.name}">${b.icon}<div class="badge-label">${unlocked?b.name:'???'}</div></div>`;
  }).join('');
  
  openModal('Profile', `<div class="profile-header">
    <div class="level">Lv.${lvl}</div>
    <div class="level-label">${['Rookie','Apprentice','Mechanic','Journeyman','Expert','Master','Legend'][Math.min(lvl-1,6)]||'Ace'}</div>
    <div class="xp-bar"><div class="xp-fill" style="width:${Math.min(100,curXp/nextXp*100)}%"></div></div>
    <div class="xp-text">${streak.xp} XP total</div>
  </div>
  <div class="streak-display"><div class="streak-num">${streak.count}🔥</div><div class="streak-label">Day Streak</div></div>
  <div class="stats-grid">
    <div class="stat-box"><div class="num">${viewedCount}</div><div class="label">Viewed</div></div>
    <div class="stat-box"><div class="num">${bookmarks.length}</div><div class="label">Saved</div></div>
    <div class="stat-box"><div class="num">${pct}%</div><div class="label">Complete</div></div>
  </div>
  <div style="font-size:.85rem;font-weight:600;margin:12px 0 8px">Badges (${BADGES.filter(b=>b.req()).length}/${BADGES.length})</div>
  <div class="badge-grid">${badgesHtml}</div>
  <button class="quiz-option" style="text-align:center;margin-top:16px" id="startQuizBtn">🧠 Start Quiz Mode</button>`);
  document.getElementById('startQuizBtn')?.addEventListener('click',()=>{closeModal();startFullQuiz()});
}

// ═══ INIT ═══
updateStreak();
document.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    cards = [...ALL_CARDS];
    renderCard(0);
  }, 800);
});
</script>
</body>
</html>
