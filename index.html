@media(max-width:360px){.card .title{font-size:1.1rem}.card .content{font-size:.85rem}#side-actions button{width:42px;height:42px;font-size:1.1rem}#side-actions{gap:8px}.card{padding:70px 16px 90px}}@media(min-width:600px){.cat-grid{grid-template-columns:1fr 1fr 1fr}}@media(display-mode:standalone){#install-banner{display:none!important}}@media(prefers-reduced-motion:reduce){.card{transition-duration:0ms}}
/* PWA install banner */

#install-banner.show{display:flex}
#install-banner .install-btn{padding:8px 16px;border-radius:10px;border:0;background:linear-gradient(135deg,#f7971e,#ffd200);color:#000;font-weight:700;font-size:.8rem;cursor:pointer;white-space:nowrap}

</style>

<script>
// ═══════════════════════════════════════════════════════════════
// CARD DATA (part 1 - Technician: Engine, Fuel, Electrical systems)
// ═══════════════════════════════════════════════════════════════
const CARDS = [
{id:'eng1',cat:'eng',title:'O-235-L2C Identification',emoji:'⚙️',content:'Engine: Lycoming O-235-L2C. Serial number on crankcase left side near magneto. Model suffix L2C = specific configuration with 110 HP at 2550 RPM, 7.0:1 compression. Displacement: 233.3 cu in (3.82 L). Bore 4.375 in, stroke 3.875 in.',tip:'Always verify the exact suffix (L2C) when ordering parts — not all O-235 variants are identical.',quiz:{q:'O-235 displacement?',o:['200 cu in','233.3 cu in','250 cu in','285 cu in'],a:1}},
{id:'eng2',cat:'eng',title:'Engine Removal Prep',emoji:'🔧',content:'Before removing engine: drain oil (6 qt), drain fuel from gascolator, disconnect battery master. Tag all lines and wires. Remove spinner and prop, remove cowling, disconnect control cables at firewall, fuel line at gascolator, electrical harness at firewall connector.',tip:'Take photos before disconnecting — makes reassembly much easier.',quiz:{q:'What must be done before engine removal?',o:['Just unbolt','Drain oil + fuel, tag all lines','Remove only prop','Disconnect battery only'],a:1}},
{id:'eng3',cat:'eng',title:'Cylinder Removal',emoji:'🔩',content:'To remove a cylinder: 1) Remove rocker covers, push rods, 2) Remove intake/exhaust pipes, 3) Remove spark plugs, 4) Remove cylinder base nuts (100-120 in-lb), 5) Remove through bolts (35-40 ft-lb), 6) Tap cylinder loose with rubber mallet. Lift cylinder straight off studs — do not rock it.',tip:'Mark push rods — they must go back in the same position (intake/exhaust, left/right).'},
{id:'eng4',cat:'eng',title:'Piston Ring End Gap',emoji:'🔧',content:'Ring end gaps (measured in cylinder bore): Top compression ring: 0.010-0.020 in. Second compression ring: 0.010-0.020 in. Oil control ring: 0.015-0.055 in. Max allowable when worn: 0.040 in (compression rings), 0.065 in (oil ring).',tip:'Always stagger ring gaps 120° apart to minimize blow-by.',quiz:{q:'Top ring end gap range?',o:['0.005-0.010','0.010-0.020','0.020-0.030','0.030-0.040'],a:1}},
{id:'eng5',cat:'eng',title:'Piston Installation',emoji:'🔩',content:'Pistons have an arrow or notch pointing forward (toward propeller). Rings: install with manufacturer mark up. Oil ring expander gap must be opposite the oil ring rail gaps. Compress rings with band-type tool, tap piston into bore with wooden hammer handle. Connecting rod bolts must be torqued to 265-275 in-lb.',tip:'Use new self-locking nuts on connecting rod bolts. They are one-time use.',quiz:{q:'Connecting rod bolt torque?',o:['200-220 in-lb','265-275 in-lb','300-320 in-lb','350-370 in-lb'],a:1}},
{id:'eng6',cat:'eng',title:'Crankshaft Runout Check',emoji:'📏',content:'Crankshaft runout check (during overhaul): Place crank on V-blocks at front and rear main journals. Dial indicator at center main journal. Max runout: 0.002 in (0.051 mm). If exceeded: straighten or replace crankshaft. Prop flange runout: max 0.002 in face, 0.0015 in radial.',tip:'Excessive runout causes vibration and premature bearing wear.'},
{id:'eng7',cat:'eng',title:'Main Bearing Installation',emoji:'🔧',content:'Main bearings are precision insert type. Bearing shells must be clean and dry (no oil on shell back). Torque main bearing nuts to 35-40 ft-lb. Sequence: tighten from center outward. After all torqued: check crankshaft rotates freely (0.005-0.010 in clearance per journal).',tip:'If crankshaft binds after torquing main bearings, check for dirt under bearing shells.'},
{id:'eng8',cat:'eng',title:'Connecting Rod Big End Bore',emoji:'📐',content:'Connecting rod big end bore (with bearings installed): 1.8860-1.8865 in. Rod side clearance on crank journal: 0.006-0.016 in. Rod bolt stretched length: max 0.005 in over original. Replace rods if bushing is worn or bolt holes are damaged.',tip:'Always measure rod bolt stretch with a micrometer — do not rely on torque alone for critical bolts.'},
{id:'eng9',cat:'eng',title:'Oil Pump Clearances',emoji:'🛢️',content:'Oil pump (gerotor type): Outer rotor to housing clearance: 0.003-0.006 in. Inner to outer rotor tip clearance: 0.003-0.006 in. Rotor end play: 0.001-0.004 in. If clearances exceed 0.010 in, replace pump. Oil pressure at idle must be ≥25 PSI, at cruise 60-90 PSI.',tip:'Low oil pressure at idle but good at cruise = worn pump or bearings.',quiz:{q:'Min oil pressure at idle?',o:['10 PSI','25 PSI','40 PSI','60 PSI'],a:1}},
{id:'eng10',cat:'eng',title:'Valve Guide Replacement',emoji:'🔧',content:'Valve guide wear limits: Intake guide ID: max 0.002 in oversize. Exhaust guide ID: max 0.003 in oversize. Replacement: press out old guide (from combustion chamber side), press in new guide to specified height. Ream to correct ID after installation. Valve stem-to-guide clearance: intake 0.001-0.003 in, exhaust 0.002-0.004 in.',tip:'Tight exhaust guides cause valve sticking. Loose guides cause oil burning.'},
{id:'eng11',cat:'eng',title:'Valve Seat Grinding',emoji:'🔧',content:'Valve seat width: intake 0.045-0.065 in, exhaust 0.055-0.075 in. Seat angle: 45°. Interference angle: 0.5-1.0° (seat 45°, valve face 44° or 46°). After grinding: lap valve to seat with compound. Check seal with Prussian blue or vacuum test.',tip:'Too narrow a seat = poor heat transfer. Too wide = poor sealing.',quiz:{q:'Valve seat angle?',o:['30°','45°','60°','90°'],a:1}},
{id:'eng12',cat:'eng',title:'Magneto Impulse Coupling',emoji:'🧲',content:'Slick magneto impulse coupling: Check that impulse spring snaps at 1-2 RPM (hand propping speed). If no snap: coupling is stuck or broken. Impulse coupling advances timing for start, then drops out above ~300 RPM. Service: clean with solvent, lubricate pivot points with light oil.',tip:'A broken impulse coupling = no or weak spark during cranking. Engine won\'t start.',quiz:{q:'What does impulse coupling do?',o:['Retards timing','Advances timing for start','Doubles spark','Cuts mag at idle'],a:1}},
{id:'eng13',cat:'eng',title:'Carburetor Float Level',emoji:'⛽',content:'Marvel-Schebler MA4-5AA float level: 0.375 in (3/8 in) from gasket surface to bottom of float. Measure with float arm just touching needle valve (not compressing the spring). Too high = rich mixture, fuel overflow. Too low = lean mixture, fuel starvation.',tip:'Check float level with carburetor inverted. Float must not show any leaks (shake — if it has fuel inside, replace it).',quiz:{q:'MA4-5AA float level?',o:['1/4 in','3/8 in','1/2 in','5/8 in'],a:1}},
{id:'eng14',cat:'eng',title:'Carb Idle Speed/Mixture',emoji:'🎛️',content:'Idle speed: 600-700 RPM warm. Idle mixture adjustment: turn idle mixture screw (on carburetor) to obtain maximum idle RPM, then lean until RPM drops 10-15 RPM, then enrich slightly. Cutoff test: pull mixture to idle cutoff at 1,000 RPM — engine should stop within 5 seconds.',tip:'If engine continues running past 10 seconds on idle cutoff, idle mixture is too rich.'},
{id:'eng15',cat:'eng',title:'Cylinder Base Nut Torque Sequence',emoji:'🔩',content:'Cylinder base nuts torque sequence: Tighten in 2 steps. Step 1: 50-60 in-lb. Step 2: 100-120 in-lb. Sequence: Tighten diagonally (crossover pattern). There are 6 base nuts per cylinder. After torquing, safety-wire all nuts in pairs.',tip:'Use AN960-10 washers under all base nuts. Never reuse locknuts.',quiz:{q:'Cylinder base nut torque?',o:['50-70 in-lb','100-120 in-lb','150-170 in-lb','200-220 in-lb'],a:1}},
{id:'eng16',cat:'eng',title:'Through Bolt Torque Sequence',emoji:'🔧',content:'Through bolts (4 per cylinder): Torque to 35-40 ft-lb. Sequence: Tighten in diagonal pattern. If one bolt is noticeably looser than others — cylinder barrel may have shifted. Check for cylinder base stud thread damage. Use new self-locking nuts each installation.',tip:'A through bolt that keeps loosening = cylinder barrel movement. Investigate before flying.',quiz:{q:'Through bolt torque?',o:['20-25 ft-lb','35-40 ft-lb','45-50 ft-lb','55-60 ft-lb'],a:1}},
{id:'eng17',cat:'eng',title:'Rocker Shaft End Play',emoji:'🔧',content:'Rocker shaft end play: 0.005-0.015 in. If excessive: replace rocker shaft bushings in the cylinder head. Rocker arm-to-stem pad clearance: must be centered on valve stem tip. Adjust valve clearance: intake 0.004-0.008 in, exhaust 0.006-0.012 in cold.',tip:'Worn rocker bushings cause valve train noise and inconsistent valve lash readings.'},
{id:'eng18',cat:'eng',title:'Push Rod Tube Seal',emoji:'🔄',content:'Push rod tube seals (rubber O-rings at each end): Common leak source. Replace whenever rocker boxes are removed. Lubricate O-rings with engine oil before installation. Push rod tubes must be straight — roll on flat surface to check. Bent tube = replace immediately (valve train damage risk).',tip:'Oil running down the cylinder fins from the rocker box = push rod tube seal leak.',quiz:{q:'Common rocker box leak source?',o:['Head gasket','Push rod tube seals','Valve cover','Base nuts'],a:1}},
{id:'eng19',cat:'eng',title:'Crankcase Sealant',emoji:'🔧',content:'Crankcase halves are joined with Loctite Master Gasket or equivalent non-hardening sealant. Apply thin, even coat — excess can block oil passages. Torque crankcase bolts in 3 steps (refer to manual for sequence). Step 1: 40 in-lb, Step 2: 80 in-lb, Step 3: 110 in-lb (some bolts vary — check manual).',tip:'Crankcase seal leaks = oil dripping from bottom of engine. Re-torque bolts before resealing.'},
{id:'eng20',cat:'eng',title:'Prop Flange Runout',emoji:'📏',content:'Propeller flange runout: Max face runout 0.002 in. Max radial runout 0.0015 in. Measured with dial indicator on flange face and outer diameter. If exceeded: check crankshaft runout, check flange bolt hole condition. Elongated bolt holes = immediate replacement.',tip:'High prop vibration after installation? Check flange runout first.',quiz:{q:'Max prop flange face runout?',o:['0.001 in','0.002 in','0.005 in','0.010 in'],a:1}},
{id:'eng21',cat:'eng',title:'Engine Mount Inspection',emoji:'🔩',content:'Dynafocal engine mount: 4 Lord rubber vibration isolators. Inspect: rubber for cracking, separation from metal, compression set. Mount tubes for cracks at weld joints. Replace all 4 mounts if any one is bad. Torque mount bolts to 180-200 in-lb.',tip:'Engine vibration in cruise can be caused by worn Lord mounts — not just prop imbalance.'},
{id:'eng22',cat:'eng',title:'Oil Filter Cut-Open Guide',emoji:'🔬',content:'Cut filter element open with filter cutter (never hacksaw — metal shavings). Stretch element out, inspect under good light. Normal: fine dark carbon particles. Suspicious: fine metallic dust (silver = aluminum/lead, magnetic = steel). Critical: chunks, flakes, or copper-colored particles — ground engine.',tip:'Oil filter analysis is your best early warning. Do it at EVERY oil change.',quiz:{q:'What tool to cut oil filter?',o:['Hacksaw','Filter cutter','Tin snips','Knife'],a:1}},
{id:'eng23',cat:'eng',title:'Compression Test Troubleshoot',emoji:'💨',content:'Low compression troubleshooting: Air from exhaust = exhaust valve leak. Air from intake = intake valve leak. Air from crankcase breather = worn rings/cylinder. Air from adjacent cylinder = head gasket leak between cylinders. Below 60/80: investigate. Below 40/80: cylinder must be removed.',tip:'A cylinder with 50/80 but smooth engine operation may be flyable — but find the cause at next available maintenance.'},
{id:'eng24',cat:'eng',title:'Ignition Harness Replacement',emoji:'🔌',content:'Replace ignition harness if: cracked insulation, corroded terminals, hard/brittle wire, or resistance out of spec (1,000-5,000 ohms per lead). Harness routing: keep away from exhaust pipes, secure with Adel clamps. Lead must be fully seated and spring-locked at both spark plug and magneto ends.',tip:'A failing harness = mag drop that changes with engine temperature or moisture.',quiz:{q:'Typical ignition lead resistance?',o:['100-500 ohms','1,000-5,000 ohms','10,000-50,000 ohms','100,000+ ohms'],a:1}},
{id:'eng25',cat:'eng',title:'Starter Overhaul Specs',emoji:'🔌',content:'Prestolite MZ-4230 starter: Armature commutator undercut depth: 0.020-0.030 in. Brush minimum length: 5/16 in (7.9 mm). Spring tension: 32-48 oz. Drive gear: must engage and disengage freely (clean and lubricate). No-load test: draws 50-70A at 12V, 5,000+ RPM.',tip:'Starter that spins but does not engage = worn drive gear or solenoid not throwing fully.'},
{id:'eng26',cat:'eng',title:'Alternator Output Test',emoji:'⚡',content:'Test: Engine at 1,500 RPM, master ON. Measure voltage at battery: 13.8-14.2V normal charging. Load test: turn on all electrical loads — voltage should stay above 13.0V. Field circuit: master switch closes alternator field relay. If no charge: check belt, field wire (F terminal), regulator connections.',tip:'No charge with good belt = check the 5-amp field breaker on the panel first.',quiz:{q:'Normal charging voltage?',o:['12.0-12.5V','13.8-14.2V','15.0-15.5V','16.0-16.5V'],a:1}},
{id:'eng27',cat:'eng',title:'Top Overhaul vs Major Overhaul',emoji:'🔧',content:'Top overhaul: Remove cylinders, re-ring, hone/replace cylinders, grind valves, replace gaskets. Does NOT remove crankshaft or touch lower end. Major overhaul: Complete disassembly to bare crankcase. Replace all bearings, rings, seals, gaskets. TBO is 2,000 hr or 12 years. Top overhaul typically done at 1,000 hr.',tip:'If one cylinder needs replacement, Lycoming recommends replacing all 4 simultaneously.'},
{id:'eng28',cat:'eng',title:'Stud Thread Repair',emoji:'🔧',content:'Stripped stud threads: Use Helicoil or Keensert for aluminum crankcase/cylinder head repairs. Drill out old threads, tap to specified size, install insert. Stud installation depth: 0.500-0.625 in minimum engagement. Use Loctite 271 (stud grade) for installation. Torque stud to 50-80 in-lb.',tip:'A stripped base stud hole in the crankcase is repairable with Helicoil — no need to scrap the case.'},
{id:'eng29',cat:'eng',title:'Engine Run-In Procedure',emoji:'🔥',content:'After overhaul/top overhaul: Use straight mineral oil (no additives) for break-in. Run at 1,200-1,500 RPM for 5 min to check for leaks. Then run at 75% power (2,400 RPM) for 2 hours minimum with cylinder head temps in normal range. CHT must not exceed 450°F during break-in. After break-in: change oil and filter, inspect element.',tip:'If CHT stays below 350°F during break-in, the rings might not seat properly. Use less cowling or higher power.'},
{id:'eng30',cat:'eng',title:'Oil Pressure Troubleshoot',emoji:'🛢️',content:'Low oil pressure at idle: Check oil level first. If OK: suspect worn oil pump, worn main bearings, or pressure relief valve stuck open. Relief valve: spring-loaded ball/plunger on crankcase. Remove, clean, check spring free length (1.850 in). Replace if compressed below 1.750 in.',tip:'Try changing oil (correct viscosity) before tearing into the engine for low oil pressure.'},
{id:'eng31',cat:'eng',title:'CHT Probe Replacement',emoji:'🌡️',content:'CHT probe is a bayonet-type thermocouple under cylinder #3 spark plug (hottest cylinder). Replacement: remove spark plug, install new CHT gasket probe between plug and cylinder head. Torque spark plug to 25-30 ft-lb over the probe. Wire routing: away from exhaust, secure with Adel clamps.',tip:'If CHT gauge reads low or erratic, the probe is likely failing. Always check with an infrared pyrometer first.',quiz:{q:'Which cylinder typically has the CHT probe?',o:['#1','#2','#3','#4'],a:2}},
{id:'eng32',cat:'eng',title:'Vacuum Pump (Optional)',emoji:'🌀',content:'If installed: engine-driven dry vacuum pump. Dried vane type — vanes wear over time. Normal vacuum: 4.5-5.5 in Hg. Failure: sudden loss of vacuum = gyros fail. No warning — replace every 500 hours or per manufacturer recommendation. Pump replacement: disconnect lines, remove 3 bolts, install new pump with new gasket.',tip:'Always carry a vacuum pump replacement in the hangar. They fail without warning.',quiz:{q:'Normal vacuum reading?',o:['2.5-3.5 in Hg','4.5-5.5 in Hg','6.5-7.5 in Hg','8.5-9.5 in Hg'],a:1}},
{id:'eng33',cat:'eng',title:'Engine Logbook Requirements',emoji:'📋',content:'Engine logbook must contain: 1) Engine make/model/serial at installation. 2) Total time in service (TTSN). 3) Time since last overhaul. 4) All 100-hr/annual entries with compression readings. 5) Oil change records. 6) AD compliance. 7) Major repair/alteration form 337. 8) Prop strike entries. 9) TBO status.',tip:'A complete engine logbook adds significant value to the aircraft. Keep all entries current.',quiz:{q:'Engine log entries include?',o:['Only oil changes','All maintenance + ADs + TBO','Only annual','No log needed'],a:1}},
{id:'eng34',cat:'eng',title:'Cylinder Base Crack Inspection',emoji:'🔍',content:'Area: Cylinder base flange at the crankcase. Cracks often start at bolt holes. Method: Clean with solvent, inspect with 10x magnifying glass. Use dye penetrant (red dye/white developer) for suspect areas. A crack from bolt hole to flange edge = unairworthy cylinder. Replace immediately.',tip:'Cracked cylinder flanges are caused by over-torquing base nuts or thermal shock from rapid cooling.'},
{id:'eng35',cat:'eng',title:'Magneto Timing Procedure',emoji:'🧲',content:'Set both magnetos to fire at 24° BTDC at 500 RPM. Use timing light and timing pin. Install timing pin in crankshaft, rotate engine until pin engages. Connect timing light to #1 plug lead. Rotate engine backward 30°, then forward slowly until light flashes. If not at 24° mark on timing ring, adjust magneto coupling.',tip:'After timing, safety-wire the magneto adjustment nuts. Check engine run-up: max mag drop 175 RPM, diff <50 RPM.',quiz:{q:'Magneto timing BTDC?',o:['20°','24°','28°','32°'],a:1}},
{id:'eng36',cat:'eng',title:'Prop Governor Not Installed',emoji:'❓',content:'C152 has FIXED-PITCH propeller — no governor. No blue knob. No prop control cables. No carbon blocks, no feathering, no reverse. RPM controlled ONLY by throttle. Fixed-pitch means the prop is optimized for cruise efficiency. Takeoff: 2,550 RPM. Cruise: 2,200-2,450 RPM.',tip:'Because RPM follows airspeed, expect RPM increase in descent and decrease in climb.'},
{id:'eng37',cat:'eng',title:'Engine Mount Bolt Torque',emoji:'🔧',content:'Engine mount attachment: Bolts at firewall (4 points) and at engine (4 Lord mounts). Firewall bolts: 180-200 in-lb. Lord mount through-bolts: 300-350 in-lb. Use new AN6 bolts and self-locking nuts. Safety-wire all bolts after torquing. Check for movement — if engine shifts on mount, replace bushings.',tip:'An engine that shakes excessively at idle may have loose mount bolts OR bad Lord mounts.'},
{id:'eng38',cat:'eng',title:'Induction System Leak Check',emoji:'🌬️',content:'Induction system leaks cause lean mixture and rough idle. Check: carburetor gasket at sump, intake pipe gaskets at cylinders, intake pipe O-rings at carburetor. Method: spray carb cleaner at gasket joints while engine idles — if RPM changes, there is a leak. Torque intake nuts to 100-120 in-lb.',tip:'An induction leak downstream of the carburetor creates a lean condition that can cause detonation.'},
{id:'eng39',cat:'eng',title:'Engine Pre-Oiling Procedure',emoji:'🛢️',content:'Necessary after overhaul or extended storage. Method 1: Fill oil, remove rocker covers, crank with starter (plugs out, mags grounded) until oil flows from all push rod tubes. Method 2: Use pre-oiler tool that pressurizes oil system externally. Never start an engine that has been dry — main bearing damage occurs within seconds.',tip:'Pre-oiling is critical after cylinder replacement. Rings need oil immediately on first start.'},
{id:'eng40',cat:'eng',title:'Camshaft End Play',emoji:'⚙️',content:'Camshaft end play: 0.003-0.012 in. Measured with dial indicator at camshaft gear. If excessive: replace thrust plate (or spacer). Cam lobe lift: check with micrometer — minimum 0.285 in intake, 0.285 in exhaust. Worn lobes below 0.275 in = replace camshaft.',tip:'Camshaft wear is progressive. If one lobe is worn, the rest are not far behind — replace the set.'},
{id:'eng41',cat:'eng',title:'Hydraulic Lifter Service',emoji:'🔧',content:'Hydraulic lifters (zero lash): Check for bleed-down time. Compress fully — should leak down in 10-60 seconds. If less than 5 seconds: worn plunger. If more than 120 seconds: stuck plunger. Install with dry exterior (oil on plunger only). After installation, engine will be noisy for 5-10 min until lifters pump up.',tip:'A noisy lifter after start that quiets down = normal. One that stays noisy = failing lifter.'},
{id:'eng42',cat:'eng',title:'Exhaust System Crack Check',emoji:'🔍',content:'Exhaust crack inspection areas: Flange welds at cylinder head. Collector welds where 4 pipes join. Muffler inlet/outlet welds. AD 83-01-01: muffler baffle check every 100 hr. Internal baffle collapse: restricted exhaust flow = power loss + possible engine damage. Use a mirror and light to check inside muffler.',tip:'A restricted exhaust (collapsed baffle) can cause hard starting and poor performance — easy to misdiagnose as carburetor issue.'},
{id:'eng43',cat:'eng',title:'Firing Order Verification',emoji:'⚙️',content:'Firing order: 1-3-2-4. Cylinder numbering: #1 = right front (from cockpit view), #2 = right rear, #3 = left front, #4 = left rear. Magneto P-leads: Left mag fires top plugs, Right mag fires bottom plugs. Check with timing light on each lead to verify correct firing order.',tip:'Mistaken firing order usually happens after magneto replacement. Double-check before first start run.',quiz:{q:'O-235 firing order?',o:['1-2-3-4','1-3-2-4','1-4-2-3','1-3-4-2'],a:1}},
{id:'eng44',cat:'eng',title:'Compression Test Form',emoji:'📝',content:'Record: Cyl #1 ___/80, #2 ___/80, #3 ___/80, #4 ___/80. Note leak source (exh/intake/breather). Date, tach time, ambient temp. Acceptable: all above 60/80 with <20 PSI variation. Marginal: one below 60 but >50 — monitor, recheck in 25 hours. Unairworthy: any below 50/80 or 25+ variation.',tip:'Always do compression test with engine at operating temperature (rings seated best when warm).'},
{id:'eng45',cat:'eng',title:'Oil Cooler (Optional)',emoji:'🛢️',content:'Some C152s have an oil cooler mounted on the left engine baffle. Check for: oil leaks at hose fittings, bent/damaged cooling fins, secure mounting. Hose condition: replace if cracked or stiff. Oil cooler thermostatic bypass valve: opens at 180°F. If oil runs too cold, bypass valve may be stuck open.',tip:'Low oil temperature (below 140°F) is almost as bad as high — moisture does not boil off, causing sludge.'},
{id:'fuel1',cat:'fuel',title:'Fuel Line Replacement',emoji:'⛽',content:'Rubber fuel hoses: Replace every 7-10 years per AD recommendations. Part numbers: use aviation-grade MIL-H-6000 or MIL-H-8794 hose. Cutting: use sharp knife/rotary cutter — a diagonal cut reduces flow area. Installation: Adel clamps at 12-inch intervals, no tight bends (min radius 6x hose OD).',tip:'Mark installation date on hose with permanent marker. Date code is critical for AD compliance.',quiz:{q:'Fuel hose replacement interval?',o:['2-3 years','7-10 years','15-20 years','Never'],a:1}},
{id:'fuel2',cat:'fuel',title:'Gascolator Screen Cleaning',emoji:'🔍',content:'Gascolator (fuel strainer): Location is lower engine firewall. Remove quick-drain plug, remove bowl (retaining wire), remove screen. Clean screen with solvent and brush. Check for: collapsed or torn screen, debris in bowl (indicates tank contamination), gasket condition. Re-torque bowl bolts to 25-30 in-lb. Check for leaks after reassembly.',tip:'If you find sediment in the gascolator, the fuel tanks need to be sumped more thoroughly.'},
{id:'fuel3',cat:'fuel',title:'Fuel Selector Valve Rebuild',emoji:'🔧',content:'Fuel selector valve (LEFT/RIGHT/BOTH/OFF): Rebuild if leaking or stiff. Disassemble: remove handle nut, pull valve core. Inspect O-rings (replace all). Lubricate with petroleum-compatible grease (MIL-G-23827). Check detent spring and ball — must give positive position feel. Reinstall, check all positions for proper fuel flow.',tip:'A leaking fuel selector can cause fuel to crossfeed when it should not, or not feed when it should.'},
{id:'fuel4',cat:'fuel',title:'Fuel Quantity Sender Check',emoji:'📊',content:'Float-type fuel senders in each wing tank. Check: float arm travel (full stop to empty stop), float integrity (no fuel inside), sender resistance (full ~0 ohms, empty ~30 ohms). Wire connection: clean and tight. Ground: sender body must be bonded to airframe for accurate reading.',tip:'If a fuel gauge reads full all the time, the float might be stuck or the sender wire is grounded.'},
{id:'fuel5',cat:'fuel',title:'Fuel Cap Seal Replacement',emoji:'⛽',content:'Fuel cap gaskets: replace when cracked, hardened, or missing. Water ingress through bad cap seals = contaminated fuel. Cap part: Cessna part number or equivalent. Seal material: fuel-resistant rubber. Removal: pull off old gasket, clean cap groove, install new gasket. Locking mechanism: check tumblers for proper function.',tip:'A fuel cap that is hard to turn = the lock mechanism needs lubrication (not force).'},
{id:'fuel6',cat:'fuel',title:'Electric Boost Pump Test',emoji:'⛽',content:'Boost pump test: Master ON, pump switch ON. You should hear the pump running (located in wing root or firewall). Fuel pressure should indicate 2.0-5.0 PSI. Flow test (during engine run): Turn pump OFF at idle — fuel pressure should drop slightly. Turn ON — should rise. No change = pump not flowing, check circuit breaker, relay, pump.',tip:'The electric boost pump is critical for takeoff and landing. Test it before first flight of the day.',quiz:{q:'Electric boost pump test symptom?',o:['No change = pump not flowing','Loud noise = good','Pressure drop = good','Voltage drop = good'],a:1}},
{id:'fuel7',cat:'fuel',title:'Fuel Sump Drain Replacement',emoji:'🔧',content:'Wing sump drains (push-pull type): Replace if leaking or stuck closed. Part: Cessna 0711002-1 or equivalent. Installation: apply Loctite 567 (PTFE pipe sealant) to threads. Do NOT overtighten — aluminum threads strip easily. Test: push up to drain, release to seal — must drip no more than 1 drop per minute.',tip:'A stuck sump drain that will not open = water/sediment cannot be drained. Replace immediately.'},
{id:'fuel8',cat:'fuel',title:'AVGAS 100LL Properties',emoji:'🧪',content:'100LL: Blue dye. Lead content: 0.5-0.7 grams/liter (low-lead). Specific gravity: ~6.0 lb/US gal. Freeze point: -72°F (-58°C). Reid vapor pressure: 7 PSI max. Storage life: 12+ months if sealed and dry. Never use auto gas without an STC — ethanol damages fuel system components.',tip:'If AVGAS is not blue, do not use it. Color change indicates contamination or wrong fuel.',quiz:{q:'100LL weight per gallon?',o:['~6 lb','~7 lb','~8 lb','~9 lb'],a:0}},
{id:'fuel9',cat:'fuel',title:'Carburetor Air Filter Check',emoji:'🍃',content:'Fram CA-184 dry-paper filter. Inspect: hold up to light — if no light passes through, replace. Filter frame must be intact with no tears in paper. Gasket/seal must be present — unfiltered air bypasses engine wear. Replacement interval: annually or when dirty. In dusty environments, inspect every 50 hours.',tip:'A dirty air filter costs power and increases fuel consumption. Check it at every oil change.'},
{id:'elec1',cat:'elec',title:'Battery Load Test',emoji:'🔋',content:'Battery load test: Apply 3x amp-hour rating for 15 seconds. Example: 35Ah battery = 105A load. Voltage should stay above 9.6V at 80°F. Below 9.6V = weak battery. If battery is sealed (Concord RG-35), check open-circuit voltage: 12.8V+ = 100% charged, 12.4V = 50%, 12.0V = discharged. Charge at 4A max for 3-5 hours.',tip:'A battery that fails load test but shows good voltage will let you down on a cold morning.',quiz:{q:'Load test current for 35Ah battery?',o:['35A','105A','175A','350A'],a:1}},
{id:'elec2',cat:'elec',title:'Starter Contactor (Solenoid)',emoji:'🔌',content:'Starter contactor: heavy-duty relay near battery. Fault signs: clicking but no crank (bad contacts or low battery), continuous engagement (welded contacts). Bench test: apply 12V to small terminals — should click and show continuity on large terminals. Replace if contacts are pitted or welded. AD 99-08-01: certain part numbers require inspection.',tip:'Starter stays engaged after engine starts = welded contactor. PULL THE MASTER SWITCH immediately!'},
{id:'elec3',cat:'elec',title:'Voltage Drop Testing',emoji:'⚡',content:'Voltage drop test: With engine running and load on: measure from battery positive to alternator output terminal — should be <0.2V. Measure battery negative to alternator case — <0.1V. Starter circuit: measure drop between battery positive and starter terminal while cranking — max 0.5V. Higher = high resistance connection.',tip:'A 0.5V drop in the starter circuit = significant power loss at the starter motor.'},
{id:'elec4',cat:'elec',title:'Alternator Diode Check',emoji:'🔧',content:'Alternator diodes: test with multimeter (diode check mode). Test each diode in forward and reverse bias. Forward: 0.4-0.6V. Reverse: OL (open). A shorted diode = AC ripple in the DC system = avionics interference. Run-up test: with engine at 1,500 RPM, verify no more than 0.1V AC ripple at the battery (set meter to AC).',tip:'AC ripple >0.3V at the battery indicates bad diodes — this can damage avionics.'},
{id:'elec5',cat:'elec',title:'Master Contactor Check',emoji:'🔌',content:'Master contactor (battery solenoid): When master ON, should click and show battery voltage at both large terminals. When OFF, no continuity. Corrosion on terminals = voltage drop. Check: remove both wires, clean terminals, reinstall with anti-corrosion compound. Replacement: common part, bolt-in replacement.',tip:'If nothing electrical works when master is ON, the master contactor may have failed.'},
{id:'elec6',cat:'elec',title:'Pitot Heat Element Check',emoji:'🌡️',content:'Pitot heat: measure resistance across the two pitot heat wires at the connector. Typical: 0.5-2.0 ohms (cold). OL (open) = heating element burned out. Ground check: turn pitot heat ON with master ON — wait 30 seconds, touch pitot tube — must be warm. Current draw: ~10A at 14V.',tip:'A burned-out pitot heat element is common. Replace the entire pitot tube assembly if the element is failed.'},
{id:'elec7',cat:'elec',title:'Avionics Ground Check',emoji:'📡',content:'Avionics ground loop prevention: Single-point ground at battery negative terminal. All avionics must ground to the single point — not to airframe at different locations. Check: measure resistance between each radio chassis and battery negative — must be <0.1 ohm. A noisy radio = suspect ground issue.',tip:'Radio noise that goes away when engine RPM changes is often a ground loop problem.'},
{id:'elec8',cat:'elec',title:'Alternator Field Wire Check',emoji:'⚡',content:'Alternator field wire: if broken or disconnected, alternator will not charge. Check: With master ON, measure voltage at alternator F (field) terminal — must have battery voltage. No voltage = open field circuit (check 5A field breaker, master switch, wiring). B+ terminal: always has battery voltage (connected directly to battery via contactor).',tip:'A no-charge condition with a good belt is usually a blown field breaker or failed regulator.',quiz:{q:'No charge with good belt — check?',o:['Prop governor','Field breaker','Oil filter','Fuel pump'],a:1}},
{id:'elec9',cat:'elec',title:'Wiring Repair Standards',emoji:'🔌',content:'Aviation wiring repair: Use FAA-approved methods only. Splices must be: crimped (not soldered — solder creates stress riser), covered with heat shrink. Wire gauge: never use smaller gauge than original. Tinned copper wire required. Terminal ends: crimp-type, not screw-down lugs. Bundle routing: Adel clamps at 12-inch intervals, away from chafe points and hot surfaces.',tip:'A poor wiring repair can cause an electrical fire. Follow AC 43.13-1B Chapter 11 for approved methods.'},
{id:'elec10',cat:'elec',title:'Transponder ADS-B Check',emoji:'📡',content:'Transponder pitot-static and ADS-B check required every 24 months. 14 CFR 91.411 (static) and 91.413 (transponder). ADS-B (if installed): performance verification required. Check: altitude reporting accuracy (±125 ft), squawk code response, IDENT function, antenna VSWR (<2:1). Must be performed by certified repair station.',tip:'If transponder fails check, the aircraft is grounded for IFR operations and cannot enter Mode C veil airspace.'},
];
</script>

const CARDS2 = [
{id:'lg1',cat:'lg',title:'Landing Gear Attach Inspection',emoji:'🛞',content:'Main gear: 4130 steel tubular spring, bolted to fuselage at 2 points per side. Torque main gear attach bolts: 300-350 in-lb. Check: cracks at bolt holes, corrosion pitting on spring legs. Nose gear: attach to fuselage through steering yoke. Check kingpin for wear — max 0.010 in clearance.',tip:'A hard landing requires inspection of all gear attach bolts and spring leg condition.',quiz:{q:'Main gear attach bolt torque?',o:['200-250 in-lb','300-350 in-lb','400-450 in-lb','500-550 in-lb'],a:1}},
{id:'lg2',cat:'lg',title:'Nose Gear Shimmy Damper OH',emoji:'🔧',content:'Shimmy damper (Cleveland/hydraulic): Rebuild if leaking or not damping. Disassemble, clean all parts. Check cylinder bore for scoring. Replace O-rings and seals. Fill with MIL-H-5606 (mineral oil — same as brake fluid). Bleed air by cycling piston 20 times. Install: rod end first, tighten, safety-wire.',tip:'After rebuild, taxi test — nose wheel should not oscillate at any speed. If it does, recheck mounting.'},
{id:'lg3',cat:'lg',title:'Brake Caliper Overhaul',emoji:'🔧',content:'Cleveland 30-9 caliper: Remove from disc. Disassemble: remove pads, remove piston with air pressure (careful — pops out). Inspect bore/piston for scoring/corrosion. Replace O-ring and dust seal. Lubricate with MIL-H-5606 before assembly. Bench bleed before reinstalling. Torque mounting bolts to 100-120 in-lb.',tip:'If the brake drags, the piston may be sticking from corrosion in the caliper bore.'},
{id:'lg4',cat:'lg',title:'Brake Master Cylinder OH',emoji:'🔧',content:'Toe brake master cylinders (on rudder pedals): Rebuild if leaking or spongy. Remove clevis pin at pedal, disconnect fluid line. Disassemble: snap ring, pushrod, piston, cup, spring. Replace all seals. Hone bore if lightly corroded (max 0.005 in oversize). Reassemble with MIL-H-5606 lube. Bench bleed before installation.',tip:'Spongy brakes after bleeding = air in system. Bleed from caliper bleeder screw (push fluid up from caliper to reservoir).'},
{id:'lg5',cat:'lg',title:'Wheel Bearing Adjustment',emoji:'🔧',content:'Tapered roller bearings (Timken). Adjustment: Spin wheel while tightening axle nut to 50 in-lb (seats bearings). Back off nut to first castellation slot. Install new cotter pin. End play: 0.001-0.005 in (barely perceptible wobble). Too tight = bearing overheats, grease melts. Too loose = wheel shimmy, bearing brinelling.',tip:'After adjustment, spin wheel — should rotate freely with no roughness or binding.',quiz:{q:'Wheel bearing end play spec?',o:['0.000 in','0.001-0.005 in','0.010-0.020 in','0.050-0.100 in'],a:1}},
{id:'lg6',cat:'lg',title:'Brake Disc Runout Check',emoji:'📏',content:'Brake disc runout: max 0.010 in (measured with dial indicator at disc outer edge). If exceeded: remove disc, check wheel half mating surfaces for debris/corrosion. Clean and reassemble with proper bolt torque (50-80 in-lb). If still exceeds, replace disc. Minimum disc thickness: 0.180 in.',tip:'Brake pulsation = disc warpage. Check runout before replacing pads — new pads will wear unevenly on a warped disc.'},
{id:'lg7',cat:'lg',title:'Wheel Half Bolt Torque',emoji:'🔩',content:'Wheel halves held by 6 bolts. Torque: 50-80 in-lb (4-7 ft-lb). Sequence: tighten in star pattern, 3 steps. Safety wire: all bolts must be wired together in pairs, wire direction must TIGHTEN. Check: after torquing, measure gap between wheel halves — must be even all around.',tip:'Uneven gap = dirt between wheel halves or cross-threaded bolt. Disassemble and fix.',quiz:{q:'Wheel half bolt torque?',o:['20-40 in-lb','50-80 in-lb','100-120 in-lb','150-170 in-lb'],a:1}},
{id:'lg8',cat:'lg',title:'Parking Brake Adjustment',emoji:'🛑',content:'Parking brake handle under left panel. Adjustment: pull handle full ON. Check that both brakes engage simultaneously. If one side locks before the other: adjust at the master cylinder pushrod. Cable tension: should apply brakes when handle is pulled 1-2 inches from full release. Test: engine 1,700 RPM, pull park brake — must hold aircraft stationary.',tip:'Parking brake that will not hold = cable stretch or air in brake system. Bleed brakes first.'},
{id:'lg9',cat:'lg',title:'Landing Gear Jack Points',emoji:'🔧',content:'Jack points: Main gear — jack pad on the gear leg step bracket. Nose — jack pad on nose gear steering yoke. NEVER jack on wing struts or spar. Use a tail stand to prevent tipping. Safety: chock wheels not being lifted. Procedure: jack one main at a time for wheel removal, or jack nose + both mains simultaneously for full gear service.',tip:'When jacking the nose, the tail will drop — use a tail stand with padded support.'},
{id:'lg10',cat:'lg',title:'Nose Gear Steering Cables',emoji:'🔗',content:'Nose gear steering is linked to rudder pedals via cables and springs. Cable tension: 20-40 lbs. Centering springs return nose wheel to straight. If nose wheel shimmies at low speed: check centering spring tension and shimmy damper. Nose gear travel: 18° left and right (from rudder) — beyond that, it casters for towing.',tip:'If the aircraft pulls left during taxi, check nose gear centering springs and tire pressure first.',quiz:{q:'Nose gear steering range?',o:['12°','18°','25°','30°'],a:1}},
{id:'prop1',cat:'prop',title:'Prop Removal & Install',emoji:'🌀',content:'Removal: Remove spinner and bulkhead. Mark prop position on flange (paint mark). Remove 6 nuts and washers. Use prop puller if tight. Never hammer on prop. Installation: Clean flange and prop bore. Install new bolts (AN6-xx), washers, self-locking nuts. Torque to 55-65 ft-lb in star pattern. Safety wire all 6 bolts. Re-torque after first flight.',tip:'Always use NEW self-locking nuts. Never reuse — they lose locking ability after one torque cycle.',quiz:{q:'Prop bolts torque?',o:['35-45 ft-lb','55-65 ft-lb','75-85 ft-lb','95-105 ft-lb'],a:1}},
{id:'prop2',cat:'prop',title:'Prop Nick Repair Limits',emoji:'🔧',content:'Small nicks on leading edge: File smooth with fine file, remove all stress risers. Max depth: 0.010 in (shallow scratch). Medium: 0.010-0.030 in — file smooth, polish. Deep: >0.030 in — requires prop shop repair or blade replacement. Nicks on blade face: same depth limits. Trailing edge nicks: more critical, smaller tolerance.',tip:'A filed nick should have NO sharp edges. Use 400-grit sandpaper for final smoothing.',quiz:{q:'Max repairable nick depth?',o:['0.010 in','0.030 in','0.050 in','0.100 in'],a:1}},
{id:'prop3',cat:'prop',title:'Propeller Track Check',emoji:'📐',content:'Track check: With prop installed, rotate a blade to horizontal. Place a fixed pointer (screwdriver taped to cowling) 1/16 in from blade tip. Rotate prop — the other blade must pass within 1/16 in of the pointer. If more than 1/16 in difference = out of track. Causes: bent blade, propeller mounting issue, or crankshaft flange issue.',tip:'Out-of-track prop = vibration. If track is off, check flange runout first before blaming the prop.',quiz:{q:'Max prop track tolerance?',o:['1/32 in','1/16 in','1/8 in','1/4 in'],a:1}},
{id:'prop4',cat:'prop',title:'Prop Strike Inspection Steps',emoji:'🔧',content:'After prop strike: 1) Inspect prop for cracks (Zyglo required), 2) Check flange bolt hole elongation, 3) Check crankshaft runout (dial indicator), 4) Remove engine, disassemble, magnaflux crankshaft, 5) Inspect connecting rods for bend, 6) Check accessory case gears for damage. Mandatory: engine log entry describing the strike and inspection performed.',tip:'Even a ground strike that stops the engine instantly requires full teardown per Lycoming SB.'},
{id:'prop5',cat:'prop',title:'Spinner Bulkhead Cracks',emoji:'🔍',content:'Spinner bulkhead (backplate): Common crack location — around mounting screw holes. Cracked bulkhead can separate spinner in flight. Inspection: remove spinner, clean bulkhead, inspect with 10x magnifier around each hole. Small cracks (<1/4 in): stop-drill. Large cracks: replace bulkhead. Spinner itself: check for cracks at screw holes.',tip:'A loose spinner (wobbling) when rotating = bulkhead cracked or screws loose. Fix before flight.',quiz:{q:'Cracked spinner bulkhead risk?',o:['Noise','Spinner separation','Vibration','Poor performance'],a:1}},
{id:'prop6',cat:'prop',title:'Prop Static Balance',emoji:'⚖️',content:'Static balance: Mount prop on balance arbor (through center bore). Prop should remain stationary in any position. Heavy blade will settle at bottom — mark it. Remove material from heavy blade back side (only on marked areas — factory balance marks). Maximum imbalance: 1/4 in-oz on a scale. After balancing, re-mark blades for reference.',tip:'A prop that always stops in the same position when rotated is out of balance.'},
{id:'prop7',cat:'prop',title:'Prop Timer Interval',emoji:'⏱️',content:'Propeller overhaul: Every 5 years or 2,000 hours whichever comes first. Components: must be returned to a certified prop shop. Overhaul includes: disassembly, Zyglo crack inspection of blades and hub, repitch to factory specs, new seals, new gaskets, dynamic balance if available. Maintain a propeller logbook showing dates and times.',tip:'Prop TBO is mandatory — an engine can run past TBO, but props cannot.'},
{id:'prop8',cat:'prop',title:'Crankshaft Prop Flange',emoji:'🔩',content:'Crankshaft prop flange (SAE 1, 6-bolt): Check bolt holes for elongation — use a go/no-go gauge. Elongation beyond specified limit = replace flange or crankshaft. Flange bolt threads: clean and inspect before each prop installation. Apply anti-seize to bolt threads (not to nuts). Torque: 55-65 ft-lb with calibrated wrench.',tip:'Bolt hole elongation is a sign of a loose propeller in the past. It is a progressive failure.',quiz:{q:'How many bolts on prop flange?',o:['4','6','8','10'],a:1}},
{id:'ctrl1',cat:'ctrl',title:'Control Cable Tension by Temp',emoji:'📐',content:'Control cable tension (1/8 in 7x7 or 7x19): Standard at 70°F is 25-45 lbs. Temperature compensation: adjust ±1 lb per 10°F from 70°F. 32°F: target 31-38 lbs. 100°F: target 22-32 lbs. Always measure at multiple points along cable run. Use calibrated tensiometer (riser gauge for 1/8 in cable).',tip:'Tight cables in cold weather = relaxed in hot weather. Adjust for the season you are in.',quiz:{q:'Cable tension adjustment per 10°F?',o:['0.5 lb','1.0 lb','2.0 lb','5.0 lb'],a:1}},
{id:'ctrl2',cat:'ctrl',title:'Turnbuckle Safety Wire',emoji:'🔧',content:'Turnbuckle safety wire: Use 0.040 in stainless steel wire. Required on both eyes of each turnbuckle. Wrap 4 turns minimum around the barrel, then through the eye, wrap 4 more turns. Direction: wire must be TIGHTENING (wrap so that any pull on the wire tightens the turnbuckle). Tape over safety wire to prevent snagging. Inspect at every annual.',tip:'A loose turnbuckle can allow a control surface to separate from the system. Safety wire is critical.'},
{id:'ctrl3',cat:'ctrl',title:'Aileron Rigging (Differential)',emoji:'📐',content:'Aileron differential: Up aileron travels 20° ±1°, down aileron travels 15° ±1°. The differential creates more drag on the down-going wing, reducing adverse yaw. Adjust at turnbuckles on the aileron cables. Neutral position: both ailerons flush with wing trailing edge. Check: measure with digital level or protractor at the aileron trailing edge.',tip:'If differential is wrong, adverse yaw increases — noticeable in turns.',quiz:{q:'Aileron differential: up vs down?',o:['up 15° down 15°','up 20° down 15°','up 25° down 20°','up 20° down 20°'],a:1}},
{id:'ctrl4',cat:'ctrl',title:'Elevator Rigging',emoji:'📐',content:'Elevator travel: Up 23° ±1°, Down 15° ±1°. Neutral: elevator trailing edge flush with horizontal stabilizer trailing edge. Adjust at elevator cable turnbuckles. Trim tab (right elevator): neutral position flush with elevator. Trim tab travel: 20° up to 15° down. Verify full travel without binding.',tip:'Incorrect elevator travel affects flare characteristics. Too little up travel = harder to flare.',quiz:{q:'Elevator up travel?',o:['18°','23°','28°','33°'],a:1}},
{id:'ctrl5',cat:'ctrl',title:'Rudder Rigging',emoji:'📐',content:'Rudder travel: 17° ±1° left and right from neutral. Neutral: rudder aligned with vertical fin centerline. Adjust at rudder cable turnbuckles. Rudder pedal stops: adjustable to limit pedal travel. Nose wheel steering is linked — check nose wheel centering after rudder adjustments. Full rudder should give 18° nose wheel deflection.',tip:'If the rudder does not return to center, check centering springs and cable tension.'},
{id:'ctrl6',cat:'ctrl',title:'Flap System Rigging',emoji:'🔽',content:'Flap actuator: Electric motor under rear seat, drives a jackscrew. Flap positions: UP (0°), T/O (10° ±1°), FULL (40° ±1°). Microswitches at each position stop the actuator. Adjust microswitch position if flaps over/under travel. Cables: flexible push-pull cables from motor to flap torque tube. Lubricate jackscrew at every 100-hr.',tip:'Flaps that deploy unevenly = rigging issue at the torque tube arms. Check both sides.'},
{id:'ctrl7',cat:'ctrl',title:'Control Cable Replacement',emoji:'🔧',content:'Replace cable if: >10% of strands broken in one lay length, or corroded, or kinked. Length: measure old cable before removal. New cable swaging: use Nicopress sleeve (copper) for 1/8 in cable. 2 crimps per sleeve with proper dies. Pull test: must hold 500 lbs. After installation: cycle controls fully, recheck tension after 5-10 hours of flight.',tip:'Pre-stretch new cable by applying 100 lbs tension for 30 minutes before final tensioning.'},
{id:'ctrl8',cat:'ctrl',title:'Flap Actuator Adjustment',emoji:'🔧',content:'Flap actuator jackscrew: Fully retracted = flaps UP (0°). Extend to mid-position: check flaps at 10° ±1° using protractor. Fully extended: check 40° ±1°. Microswitches at each travel limit cut motor power. Adjustment: loosen microswitch bracket, reposition, retighten. Test: cycle flaps through full range 3 times — no binding, no overtravel.',tip:'If flaps stop before 40°, the lower microswitch is triggering too early. Adjust and retest.'},
{id:'ctrl9',cat:'ctrl',title:'Elevator Trim System Rigging',emoji:'🎯',content:'Elevator trim: Cable-driven spring system that changes elevator control force. Trim tab on right elevator moves opposite to elevator to reduce pilot effort. Rigging: trim wheel full nose-up, trim tab should be at full up (trailing edge up ~20°). Full nose-down: tab ~15° down. Cable tension: 15-25 lbs. Lubricate cable and trim wheel mechanism.',tip:'Trim that is hard to turn = cable binding or dry bearing. Lubricate before adjusting tension.'},
{id:'ctrl10',cat:'ctrl',title:'Control System Stop Check',emoji:'📐',content:'Control stop adjustment: Limit control surface travel to manufacturer specs. Stops are typically on the control column (elevator) and rudder pedals. Check: apply full control in each direction — verify stop contact before any binding in cables or pulleys. Full control movement must feel SOLID at the stop — not cushioned by cable stretch.',tip:'Soft control stops = cables are taking the load instead of the stops. Danger of overstressing the airframe.'},
{id:'ctrl11',cat:'ctrl',title:'Control Cable Fray Check',emoji:'🔍',content:'Cable inspection method: Run a dry cotton cloth along the full length of each cable. If the cloth snags or catches, there are broken wires. Mark the location. Measure the lay length (where fray is located). If >10% of strands are broken within one lay length: replace the cable. Pay special attention at pulley contact areas and fairlead passages.',tip:'Cables ALWAYS break at pulley contact points. Focus your inspection there.',quiz:{q:'Cable replacement threshold?',o:['5% strands broken','10% strands broken','20% strands broken','50% strands broken'],a:1}},
{id:'ctrl12',cat:'ctrl',title:'Aileron Cable Rigging',emoji:'🔗',content:'Aileron control system: Cables run from control wheel to bellcranks in each wing. Left and right aileron cables are separate circuits, cross-connected at the control column. Neutral rig: Both ailerons flush with trailing edge. Tension: 25-45 lbs (compensated). Pay special attention to pulleys in the wing root area — common chafe point.',tip:'Aileron rigging affects the aircraft\'s roll response. Improper rigging = heavy control forces.'},
{id:'ctrl13',cat:'ctrl',title:'Pulley Bearing Replacement',emoji:'🔧',content:'Control pulleys: Aluminum or phenolic. Replace if: groove is worn more than 1/2 the cable diameter, bearing is rough/noisy, flanges are chipped. Remove cotter pin, slide pulley off pin. Install new pulley, ensure smooth rotation. Grease fitting (if equipped): apply 2 pumps of Aeroshell 5. Verify cable is centered in pulley groove.',tip:'A pulley with a seized bearing creates friction and can cause the cable to wear rapidly.'},
{id:'ctrl14',cat:'ctrl',title:'Control Surface Hinge Pin Wear',emoji:'🔩',content:'Piano hinge (continuous hinge pin): Check for vertical play at the trailing edge. Grasp trailing edge, lift — max acceptable play is 1/8 in at the outboard end. Worn hinge = control surface flutter risk. Pin removal: tap out from one end with a pin punch. Pin wear area: at each hinge bracket. Replace pin if worn more than 0.010 in diameter.',tip:'If hinge pins are difficult to remove, they are corroded. Apply penetrating oil and work them free.'},
{id:'ctrl15',cat:'ctrl',title:'Flap Position Indicator Rig',emoji:'🎛️',content:'Flap position indicator in the cockpit: cable-driven from flap torque tube. Adjust: with flaps FULL UP, set indicator to UP mark. Extend flaps to FULL DOWN — indicator should point to FULL (40°). If not, adjust at the indicator cable connection at the torque tube arm. Cable tension: 15-20 lbs. Indicator face: clean and legible.',tip:'If the indicator shows a different position than the actual flaps, fix the indicator — do not rely on \"feel\".'},
{id:'frame1',cat:'frame',title:'Skin Repair — Stop-Drill',emoji:'🔧',content:'Cracked skin (non-structural only): Stop-drill at each end of crack. Use #40 (0.098 in) drill bit. Drill 1/16 in past the visible crack tip. DO NOT stop-drill on: wing spar caps, control surface hinge brackets, or primary structure. For those, follow SRM. After stop-drilling: monitor crack at next 100-hr — if it extended, more extensive repair needed.',tip:'Stop-drill hole must be at the very end of the crack. Drill from the good skin INTO the crack tip.',quiz:{q:'Stop-drill bit size?',o:['#60 (0.040 in)','#40 (0.098 in)','#30 (0.128 in)','#20 (0.161 in)'],a:1}},
{id:'frame2',cat:'frame',title:'Rivet Spacing & Edge Distance',emoji:'📐',content:'Standard rivet spacing: Edge distance: 2D (where D = rivet diameter). Rivet pitch: 4D for structural, 6D for non-structural. Minimum edge distance: 1.5D (never less — skin will tear out). Maximum pitch: 24D for oil-tight joints. For 3/32 in rivets: edge 0.188 in, pitch 0.375 in. For 1/8 in rivets: edge 0.250 in, pitch 0.500 in.',tip:'A rivet too close to the edge will cause the skin to tear out. Measure edge distance from center of rivet hole.',quiz:{q:'Minimum edge distance for rivets?',o:['1.0D','1.5D','2.0D','3.0D'],a:1}},
{id:'frame3',cat:'frame',title:'Rivet Identification Chart',emoji:'🔩',content:'MS20470AD-4-5 = Universal head, 3/32 in diameter, 5/16 in long. AN426AD-4-5 = Countersunk 100°, same. Diameter: -3 = 3/32, -4 = 1/8, -5 = 5/32, -6 = 3/16. Length: -3 = 3/16, -4 = 4/16 (1/4), -5 = 5/16. Always select length so that 1.5D of shank protrudes above the skin for proper shop head formation.',tip:'A rivet that is too short will not form a proper shop head. Too long = bulky head that may crack.'},
{id:'frame4',cat:'frame',title:'Corrosion Removal & Treatment',emoji:'🧪',content:'Surface corrosion (white powder, light pitting): Remove with Scotchbrite pad or aluminum wool (never steel wool — steel embeds and causes galvanic corrosion). Treat with Alodine (chemical conversion coating). Prime with etching primer. Paint with matching color. Deep pitting (>0.010 in): measure remaining skin thickness — if below minimum, patch or replace.',tip:'Corrosion under a paint blister is always worse than it looks. Remove ALL paint to assess the full extent.',quiz:{q:'What to NEVER use on aluminum?',o:['Scotchbrite','Steel wool','Aluminum wool','Alodine'],a:1}},
{id:'frame5',cat:'frame',title:'Wing Strut Attach Bolt',emoji:'🔩',content:'Wing strut: 4130 steel tube, streamlined cross-section. Upper end: clevis fork bolted to wing spar fitting. Lower end: bolted to fuselage fitting. Bolt torque: 250-300 in-lb. Use AN6 bolts with self-locking nuts. Inspect for: corrosion at the strut ends (inside — water enters through bolt holes), cracks at weld joints, loose attach bolts.',tip:'Strut corrosion from the inside is invisible. Tapping the strut with a coin — a dull thud instead of a clear ring = internal corrosion.'},
{id:'frame6',cat:'frame',title:'Wing Spar Inspection (AD)',emoji:'🔍',content:'AD 2000-07-05: Wing spar carry-through inspection. Area: center section of main spar under the fuselage. Method: remove floor panels, clean spar surface, inspect with 10x magnifier for cracks. Cracks typically start at rivet holes. Eddy-current inspection may be required for high-time airframes. If cracks found: spar replacement or engineering-approved repair.',tip:'This AD was prompted by a wing separation. Do not defer if cracks are found.'},
{id:'frame7',cat:'frame',title:'Fuselage Longeron Repair',emoji:'🔧',content:'Damaged longeron (cracked or corroded): Repair per Cessna SRM. Spliced repair: 1) Cut out damaged section with 1/4 in radius at corners, 2) Fabricate doubler from same material and thickness, 3) Doubler must extend 6 inches past each end of damage, 4) Rivet doubler to remaining longeron and skin. Countersunk rivets where aerodynamic smoothness is needed.',tip:'Longerons are primary structure. Any repair beyond simple patching requires engineering data (Form 337).'},
{id:'frame8',cat:'frame',title:'Floor Board Replacement',emoji:'🔩',content:'Cabin floor: aluminum honeycomb or sheet panels. Remove seats, floor covering. Replace if: corroded through, crushed honeycomb, or fastener holes elongated. New panel: cut from same thickness 2024-T3 aluminum. Rivet to floor structure using MS20470 rivets. Seal edges with fuel-resistant sealant. Reinstall seat track — check track security.',tip:'Wet floors = corrosion. Find and fix the water leak before replacing the floor.'},
{id:'frame9',cat:'frame',title:'Acrylic Window Repair',emoji:'🔧',content:'Crazed window (fine cracks): can be polished out with acrylic polish/buffing compound. Deep cracks: replace window. Remove trim ring, push window out (from inside — careful not to crack painted surfaces). New window: cut from 1/8 in acrylic (per Cessna part number). Drill holes 1/16 in larger than screw diameter (thermal expansion). Install with trim ring, new gasket.',tip:'Never use Windex, alcohol, or acetone on acrylic. Use ONLY soap + water or Plexiglas cleaner.',quiz:{q:'Crazed window treatment?',o:['Replace always','Polish out if shallow','Ignore','Paint over'],a:1}},
{id:'frame10',cat:'frame',title:'Door Latch Adjustment',emoji:'🚪',content:'Left door: Top-hinged, latch mechanism at lower edge. If door rattles or leaks: adjust latch striker plate (loosen screws, reposition, retighten). Latch pin: must engage striker by at least 1/4 in. Check door seal condition. If door is hard to close: latch mechanism may need lubrication (graphite powder, not oil — oil attracts dirt). Emergency exit (right window): pull handle — window must pop open freely.',tip:'If the door pops open in flight, do not panic. Fly normally, land, and fix the latch.'},
{id:'frame11',cat:'frame',title:'Static Port Check',emoji:'🔍',content:'Static ports: flush-mounted ports on each side of fuselage (aft of cabin). Blocked port = inaccurate altimeter and VSI. Check: during preflight, verify ports are clear of debris (bugs, wasp nests, tape). Annual: remove port fitting, check O-ring, clean with solvent, blow out line with low-pressure air (20 PSI max — instruments are sensitive).',tip:'A wasp nest in a static port is common. Always check before first flight after the aircraft has been parked.'},
{id:'frame12',cat:'frame',title:'Antenna Bonding',emoji:'📡',content:'Antenna bonding (static discharge): Each antenna must be electrically bonded to the airframe. Bonding strap: copper braid, 3/4 in wide, 6 in max length. Resistance: <0.01 ohm between antenna base and airframe ground. Corroded bond = static noise in radios. Check: remove antenna, clean base and airframe contact points, reinstall with new bonding strap.',tip:'Radio static during flight that disappears on the ground = bonding issue, not a radio problem.'},
{id:'frame13',cat:'frame',title:'Fuel Cap Bonding Wire',emoji:'⛽',content:'Fuel caps have a bonding wire or spring tab to prevent static spark when fueling. Check: wire/spring must contact both the cap and the filler neck ring. Broken bond wire = static spark risk during fueling. Replacement: solder or crimp new wire. Quick check: use ohmmeter between cap and airframe — should read <1 ohm.',tip:'Static spark during fueling can ignite fuel vapors. Never fuel without the bonding connection.'},
{id:'frame14',cat:'frame',title:'Bilge Area Corrosion Check',emoji:'🔍',content:'Bilge area (lowest part of fuselage under floor): Remove access panels. Look for: water stains, white powder (corrosion), soft spots in floor. Common sources: door seal leaks, windshield leaks, brake fluid spills. Clean: vacuum debris, wash with soap + water, dry thoroughly. Treat any corrosion found (remove, Alodine, prime, paint).',tip:'If the aircraft was parked outside, always check the bilge. Water accumulates there and causes hidden corrosion.'},
{id:'frame15',cat:'frame',title:'Rivet Removal Technique',emoji:'🔧',content:'Removing rivets: 1) Center-punch rivet head. 2) Drill through head with bit 1/64 in smaller than rivet diameter (for 1/8 in rivet = #30 bit, for 3/32 in = #40 bit). 3) Use pin punch to shear the head off. 4) Drive remaining shank out with pin punch. NEVER ream or oversize the rivet hole. If hole is damaged, step up to next size rivet.',tip:'Drilling too deep damages the underlying structure. Stop drilling as soon as the head separates — feel for the drop in resistance.',quiz:{q:'Drill size for 1/8 in rivet removal?',o:['#20','#30','#40','#50'],a:1}},
];
